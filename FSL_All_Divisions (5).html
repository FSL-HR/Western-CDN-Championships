<head>

<title>FSL 2026–27 — Schedule</title>
<style>
  :root{
    --ink:#0f1b2d; --ink-soft:#3d4b60; --faint:#7c8698;
    --line:#dfe3ea; --line-soft:#eef1f5;
    --paper:#fbfcfd; --panel:#ffffff; --rail:#101c2e;
    --ice:#2f6fb0; --ice-soft:#eaf2fa;
    --home:#12603f; --home-soft:#e7f4ec; --away:#8a3d12; --away-soft:#faeee4;
    --r-pacific:#e7f0fb; --r-island:#e4f4f1; --r-calgary:#fbeee3;
    --r-edmonton:#f3eafb; --r-koot:#eef7e2; --r-sask:#fcf3df; --r-mb:#fae7ef; --r-mixed:#eef0f3;
    --shadow:0 1px 2px rgba(16,28,46,.05),0 8px 24px rgba(16,28,46,.06);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(251,252,253,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:14px 26px 0;display:flex;flex-direction:column;gap:12px}
  .topline{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:1px}
  .brand .kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .brand h1{font-size:16px;margin:0;font-weight:650;letter-spacing:-.01em}
  .brand .season{font-size:11px;color:var(--faint)}
  .brand-src{font-size:11px;color:var(--ice);font-weight:600;margin-top:1px}
  .controls{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .count{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .search input{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--panel);
    border-radius:8px;padding:7px 11px;color:var(--ink);min-width:190px}
  .search input:focus{outline:none;border-color:var(--ice);box-shadow:0 0 0 3px var(--ice-soft)}
  .btn-upload,.btn-reset{font:inherit;font-size:13px;font-weight:550;border-radius:8px;padding:7px 12px;cursor:pointer;
    border:1px solid var(--ice);background:var(--ice);color:#fff;white-space:nowrap}
  .btn-upload:hover,.btn-reset:hover{filter:brightness(1.06)}
  .btn-reset{background:var(--panel);color:var(--ink);border-color:var(--line)}
  .btn-reset:hover{background:var(--line-soft);filter:none}

  /* tab bar */
  .tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:thin}
  .tabgrp{display:flex;align-items:center;gap:2px;padding-right:10px;margin-right:6px;border-right:1px solid var(--line)}
  .tabgrp:last-child{border-right:0}
  .tabgrp-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 6px;white-space:nowrap}
  .tab{font:inherit;font-size:13px;border:0;background:none;color:var(--ink-soft);padding:9px 12px;cursor:pointer;
    border-bottom:2px solid transparent;white-space:nowrap;border-radius:6px 6px 0 0}
  .tab:hover{background:var(--ice-soft);color:var(--ink)}
  .tab.active{color:var(--ice);border-bottom-color:var(--ice);font-weight:600}
  .team-select{font:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:var(--panel);color:var(--ink);max-width:220px}

  .content{padding:22px 26px 60px}
  .sheet-title{font-size:22px;font-weight:680;letter-spacing:-.02em;margin:0 0 4px}
  .sheet-sub{color:var(--ink-soft);max-width:76ch;margin:0 0 16px;font-size:13px;line-height:1.6}
  .team-meta{display:flex;gap:10px 18px;flex-wrap:wrap;margin:0 0 16px;font-size:12.5px;color:var(--ink-soft)}
  .team-meta b{color:var(--ink)}

  .legend{display:flex;gap:8px 16px;flex-wrap:wrap;margin:0 0 16px;font-size:12px}
  .legend .sw{display:inline-flex;align-items:center;gap:7px}
  .legend .chip{width:14px;height:14px;border-radius:4px;border:1px solid rgba(0,0,0,.08)}

  .table-wrap{overflow:auto;max-height:calc(100vh - 300px);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);background:var(--panel)}
  table{border-collapse:separate;border-spacing:0;width:100%;background:var(--panel)}
  th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line-soft);vertical-align:top}
  thead th{position:sticky;top:0;background:#f4f6f9;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:650;white-space:nowrap;z-index:3;border-bottom:1px solid var(--line)}
  thead tr:nth-child(2) th{top:34px}
  thead th:first-child{left:0;z-index:5}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover td{background:var(--ice-soft)}
  .divhdr th{background:#eef1f5;text-align:center;font-size:11px;color:var(--ink);border-left:1px solid var(--line)}
  .divhdr th:first-child{text-align:left;border-left:0;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:650}
  td.wk{position:sticky;left:0;background:var(--panel);z-index:2;font-weight:600;white-space:nowrap;border-right:1px solid var(--line)}
  tbody tr:hover td.wk{background:var(--ice-soft)}
  td.spacer,th.spacer{background:#f7f8fa;padding:0;width:8px;min-width:8px;border-bottom-color:transparent}
  .rg-pacific{background:var(--r-pacific)} .rg-island{background:var(--r-island)}
  .rg-calgary{background:var(--r-calgary)} .rg-edmonton{background:var(--r-edmonton)}
  .rg-koot{background:var(--r-koot)} .rg-sask{background:var(--r-sask)}
  .rg-mb{background:var(--r-mb)} .rg-mixed{background:var(--r-mixed)}
  /* team view H/A tags */
  .tag{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:5px;margin-right:8px}
  .tag.home{background:var(--home-soft);color:var(--home)} .tag.away{background:var(--away-soft);color:var(--away)}
  .tag.bye{background:var(--line-soft);color:var(--faint)}
  td.bye{color:var(--faint)}
  /* team view: games-played column */
  td.gp{text-align:center;vertical-align:middle;font-variant-numeric:tabular-nums;width:64px}
  .gp-badge{display:inline-flex;min-width:26px;height:26px;padding:0 8px;align-items:center;justify-content:center;
    border-radius:999px;background:var(--ice-soft);color:var(--ice);font-weight:700;font-size:13px}
  td.gp.bye{color:var(--faint);font-weight:600}
  /* team view: clearer destination block */
  .dest{padding:3px 0}
  .dest + .dest{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .dest-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .dest-place{font-size:15px;font-weight:650;letter-spacing:-.01em}
  .dest-city{color:var(--ink)}
  .dest-arena{color:var(--ink-soft);font-weight:500;font-size:13px}
  .dest-travel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--away);
    background:var(--away-soft);border-radius:999px;padding:2px 9px}
  .dest-travel.home{color:var(--home);background:var(--home-soft)}
  .dest-opps{font-size:13px;color:var(--ink-soft);margin-top:3px}
  .dest-vs{color:var(--faint)}
  .dest-count{color:var(--faint);font-size:12px}
  .err{background:#faeee4;border:1px solid #e6c3aa;color:#8a3d12;border-radius:8px;padding:10px 13px;margin:0 0 14px;font-size:13px}
  @media (max-width:820px){ .content{padding:16px 14px 50px} .topbar{padding:12px 14px 0} }
  @media print{ .topbar .controls,.tabs{display:none} table{box-shadow:none} thead th{position:static} }
</style>
</head>

<script>
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
const clean=v=>(v===null||v===undefined)?'':String(v);

const WK_ORDER=['Sep 11','Sep 18','Sep 25','Oct 02','Oct 09','Oct 16','Oct 23','Oct 30',
  'Nov 06','Nov 13','Nov 20','Nov 27','Dec 04','Jan 02','Jan 08','Jan 15',
  'Jan 22','Jan 29','Feb 05','Feb 12','Feb 19'];
const DIV_ORDER=['12U AAA','14U AAA','14U AA','16U AAA','16U AA','19U AAA'];
const DIV_KEYS={'12U AAA':'12U_AAA','14U AAA':'14U_AAA','14U AA':'14U_AA','16U AAA':'16U_AAA','16U AA':'16U_AA','19U AAA':'19U_AAA'};
function wkKey(w){ const i=WK_ORDER.indexOf(w); return i<0?99:i; }
function sortWk(a,b){ return wkKey(a)-wkKey(b)||a.localeCompare(b); }
function splitVenue(v){ v=(v||'').trim(); if(v.includes('—')){ const p=v.split('—'); return [p[0].trim(), p.slice(1).join('—').trim()]; } return [v,'']; }
function cityOf(v){ return splitVenue(v)[0]||splitVenue(v)[1]||''; }

function regionClass(text){
  const t=text.toLowerCase(); const has=(...a)=>a.some(x=>t.includes(x));
  if(t.includes('|')) return 'rg-mixed';
  if(has('winnipeg')) return 'rg-mb';
  if(has('kimberley')) return 'rg-koot';
  if(has('saskatoon','aberdeen','lloydminster')) return 'rg-sask';
  if(has('edmonton','morinville','evansburg','grande prairie')) return 'rg-edmonton';
  if(has('canmore','cochrane','banff','calgary','okotoks')) return 'rg-calgary';
  if(has('cowichan','victoria','nanaimo','duncan')) return 'rg-island';
  if(has('abbotsford','delta','langley','burnaby','richmond','surrey','vancouver')) return 'rg-pacific';
  return '';
}

// ---- unified games model ----
// Build GAMES from the built-in division sheets (default) or an uploaded list.
function gamesFromBuiltin(){
  const out=[];
  for(const div of DIV_ORDER){
    const key=DIV_KEYS[div]; const rows=(BUNDLE.div_sheets[key]||[]).slice(3);
    for(const r of rows){ if(!r||!r[0]) continue;
      const city=r[1]||'', arena=r[2]||''; const venue = city ? (city+(arena?(' — '+arena):'')) : arena;
      out.push({weekend:r[0], division:div, venue, home:r[3]||'', away:r[4]||'', note:r[5]||''});
    }
  }
  return out;
}
function gamesFromUpload(games){
  return games.map(g=>({weekend:g.weekend, division:g.division, venue:g.venue||'',
    home:g.home||'', away:g.away||'', note:g.override||g.note||'',
    day:g.day||'', time:g.time||''}));
}

let GAMES = gamesFromBuiltin();
let SRC='builtin';               // 'builtin' | 'upload'
let ALLDIV = BUNDLE.all_divisions; // hand-made grid used only for the built-in All-Divisions view
let VIEW={type:'all'};            // {type:'all'} | {type:'div',div} | {type:'team',team}
let SEARCH='';

function teamsInGames(){
  // A "team" is (name + division): a club can field entries in several divisions.
  const set=new Map();
  GAMES.forEach(g=>{ [g.home,g.away].forEach(n=>{ if(n) set.set(n+'||'+g.division, {name:n, div:g.division}); }); });
  return [...set.values()].sort((a,b)=> a.name.localeCompare(b.name) || DIV_ORDER.indexOf(a.div)-DIV_ORDER.indexOf(b.div));
}
function divsInGames(){ const present=[...new Set(GAMES.map(g=>g.division))]; return DIV_ORDER.filter(d=>present.includes(d)).concat(present.filter(d=>!DIV_ORDER.includes(d))); }
function weekendsInGames(){ return [...new Set(GAMES.map(g=>g.weekend))].sort(sortWk); }

// ---------- TAB BAR ----------
function buildTabs(){
  const tabs=$('#tabs'); tabs.innerHTML='';
  // group: overview
  const g1=el('div','tabgrp');
  g1.appendChild(mkTab('All Divisions', VIEW.type==='all', ()=>{VIEW={type:'all'}; SEARCH=''; render();}));
  tabs.appendChild(g1);
  // group: divisions
  const g2=el('div','tabgrp'); g2.appendChild(el('span','tabgrp-lbl','Divisions'));
  divsInGames().forEach(d=>{
    g2.appendChild(mkTab(d, VIEW.type==='div'&&VIEW.div===d, ()=>{VIEW={type:'div',div:d}; SEARCH=''; render();}));
  });
  tabs.appendChild(g2);
  // group: teams (dropdown to avoid 24 buttons)
  const g3=el('div','tabgrp'); g3.appendChild(el('span','tabgrp-lbl','Team'));
  const sel=el('select','team-select');
  sel.appendChild(new Option('Select a team…',''));
  teamsInGames().forEach(tm=>{ const val=tm.name+'||'+tm.div;
    const gc=GAMES.filter(g=>(g.home===tm.name||g.away===tm.name)&&g.division===tm.div).length;
    sel.appendChild(new Option(tm.name+'  ('+tm.div+') — '+gc+' games', val)); });
  if(VIEW.type==='team') sel.value=VIEW.team+'||'+VIEW.div;
  sel.addEventListener('change',()=>{ if(sel.value){ const [nm,dv]=sel.value.split('||'); VIEW={type:'team',team:nm,div:dv}; SEARCH=''; render(); } });
  // highlight team dropdown when active
  if(VIEW.type==='team'){ sel.style.borderColor='var(--ice)'; sel.style.color='var(--ice)'; sel.style.fontWeight='600'; }
  g3.appendChild(sel);
  tabs.appendChild(g3);
}
function mkTab(label, active, on){ const b=el('button','tab'+(active?' active':''),label); b.addEventListener('click',on); return b; }

// ---------- RENDER ----------
function render(){
  buildTabs();
  const c=$('#content'); c.innerHTML='';
  $('#search').placeholder = VIEW.type==='team' ? 'Filter weekends / opponents…' : 'Filter weekends / venues…';
  if(VIEW.type==='all') renderAll(c);
  else if(VIEW.type==='div') renderDiv(c, VIEW.div);
  else if(VIEW.type==='team') renderTeam(c, VIEW.team, VIEW.div);
}

function addLegend(c){
  const legend=el('div','legend');
  [['Lower Mainland','rg-pacific'],['Vancouver Island','rg-island'],['Calgary area','rg-calgary'],
   ['Edmonton / Grande Prairie','rg-edmonton'],['Kootenays','rg-koot'],['Sask corridor','rg-sask'],
   ['Manitoba','rg-mb'],['Mixed regions','rg-mixed']].forEach(([lbl,cls])=>{
    const s=el('span','sw'); s.appendChild(el('span','chip '+cls)); s.appendChild(el('span',null,lbl)); legend.appendChild(s);
  });
  c.appendChild(legend);
}
function matchRow(cells){ if(!SEARCH) return true; const q=SEARCH.toLowerCase(); return cells.some(x=>clean(x).toLowerCase().includes(q)); }

// Build a weekend x division(s) grid from GAMES. divs = array of divisions to show.
function gridRows(divs){
  const map={}; // weekend -> div -> venueCity -> Set(teams)
  GAMES.forEach(g=>{
    if(!divs.includes(g.division)) return;
    const city=cityOf(g.venue)||'TBD';
    (map[g.weekend]=map[g.weekend]||{}); (map[g.weekend][g.division]=map[g.weekend][g.division]||{});
    const b=map[g.weekend][g.division]; (b[city]=b[city]||new Set()); b[city].add(g.home); b[city].add(g.away);
  });
  const wks=weekendsInGames();
  return wks.map(w=>{
    const cells=divs.map(d=>{
      const b=(map[w]||{})[d]; if(!b) return '';
      return Object.keys(b).sort().map(city=>[...b[city]].sort().join(', ')+' @'+city).join(' | ');
    });
    return [w, ...cells];
  });
}

// ALL DIVISIONS
function renderAll(c){
  if(SRC==='builtin'){ renderHandGrid(c); return; }
  const divs=divsInGames();
  c.appendChild(el('h2','sheet-title','All Divisions — Team Locations by Weekend'));
  c.appendChild(el('p','sheet-sub','Each cell lists the teams playing that weekend in that division, grouped by venue (@venue). Coloured by the venue’s region.'));
  addLegend(c);
  renderGrid(c, divs, gridRows(divs));
}

// DIVISION (single) — same cell style, filtered
function renderDiv(c, div){
  c.appendChild(el('h2','sheet-title', div+' — Team Locations by Weekend'));
  c.appendChild(el('p','sheet-sub','Teams in '+div+' playing each weekend, grouped by venue (@venue). Coloured by the venue’s region.'));
  addLegend(c);
  renderGrid(c, [div], gridRows([div]));
}

// generic grid renderer with frozen header + weekend column
function renderGrid(c, divs, rows){
  const wrap=el('div','table-wrap'); const t=el('table'); const thead=el('thead');
  const band=el('tr'); band.className='divhdr';
  band.appendChild(el('th',null,'Weekend'));
  divs.forEach(d=>band.appendChild(el('th',null,d)));
  thead.appendChild(band); t.appendChild(thead);
  const tb=el('tbody'); let shown=0;
  rows.forEach(r=>{
    if(!matchRow(r)) return; shown++;
    const tr=el('tr');
    r.forEach((v,idx)=>{
      if(idx===0){ tr.appendChild(el('td','wk',clean(v))); return; }
      const txt=clean(v); tr.appendChild(el('td', txt?regionClass(txt):null, txt));
    });
    tb.appendChild(tr);
  });
  t.appendChild(tb); wrap.appendChild(t); c.appendChild(wrap);
  $('#rowCount').textContent=shown+' weekend'+(shown===1?'':'s');
}

// hand-made original All-Divisions grid (built-in only): pods + sub-labels
function renderHandGrid(c){
  const rows=ALLDIV;
  c.appendChild(el('h2','sheet-title', clean(rows[0][0])));
  c.appendChild(el('p','sheet-sub', clean(rows[1][0])));
  addLegend(c);
  const divRow=rows[3], subRow=rows[4];
  const wrap=el('div','table-wrap'); const t=el('table'); const thead=el('thead');
  const dtr=el('tr'); dtr.className='divhdr'; dtr.appendChild(el('th',null,''));
  let ci=1;
  while(ci<divRow.length){
    if(divRow[ci]){ const th=el('th',null,clean(divRow[ci])); th.colSpan=4; dtr.appendChild(th); ci+=4;
      if(ci<divRow.length){ dtr.appendChild(el('th','spacer')); ci++; } } else ci++;
  }
  thead.appendChild(dtr);
  const str=el('tr');
  subRow.forEach((h,i)=>{ if(h===null && i>0){ str.appendChild(el('th','spacer')); } else str.appendChild(el('th',null,clean(h))); });
  thead.appendChild(str); t.appendChild(thead);
  const tb=el('tbody'); let shown=0;
  for(let i=5;i<rows.length;i++){
    const r=rows[i]; if(!clean(r[0])) continue; if(!matchRow(r)) continue; shown++;
    const tr=el('tr');
    r.forEach((v,idx)=>{
      if(idx===0){ tr.appendChild(el('td','wk',clean(v))); return; }
      if(v===null && subRow[idx]===null){ tr.appendChild(el('td','spacer')); return; }
      const txt=clean(v); tr.appendChild(el('td', txt?regionClass(txt):null, txt));
    });
    tb.appendChild(tr);
  }
  t.appendChild(tb); wrap.appendChild(t); c.appendChild(wrap);
  $('#rowCount').textContent=shown+' weekend'+(shown===1?'':'s');
}

// TEAM — two columns: Weekend + what they're doing (@venue vs opponent), home/away tag
function renderTeam(c, team, division){
  const tg=GAMES.filter(g=>(g.home===team||g.away===team) && g.division===division);
  const div=division;
  // home base = most common city where team is the home side
  const homeCities={}; tg.forEach(g=>{ if(g.home===team){ const ct=cityOf(g.venue); if(ct) homeCities[ct]=(homeCities[ct]||0)+1; } });
  const homeBase=Object.keys(homeCities).sort((a,b)=>homeCities[b]-homeCities[a])[0]||'—';
  const homeN=tg.filter(g=>g.home===team).length, awayN=tg.filter(g=>g.away===team).length;

  c.appendChild(el('h2','sheet-title', team+' · '+div));
  const meta=el('div','team-meta');
  meta.innerHTML='<span>Division: <b>'+clean(div)+'</b></span>'+
    '<span>Home base: <b>'+clean(homeBase)+'</b></span>'+
    '<span>Games: <b>'+tg.length+'</b> ('+homeN+' home / '+awayN+' away)</span>';
  c.appendChild(meta);
  c.appendChild(el('p','sheet-sub','What '+team+' is doing each weekend — home or away, opponent, and venue. Coloured by the venue’s region.'));
  addLegend(c);

  // group this team's games by weekend
  const byWk={}; tg.forEach(g=>{ (byWk[g.weekend]=byWk[g.weekend]||[]).push(g); });
  const wks=weekendsInGames(); // full season, so bye weekends show as blanks

  const wrap=el('div','table-wrap'); const t=el('table'); const thead=el('thead');
  const band=el('tr'); band.className='divhdr';
  band.appendChild(el('th',null,'Weekend'));
  band.appendChild(el('th',null,'Games'));
  band.appendChild(el('th',null,'Where they play'));
  thead.appendChild(band); t.appendChild(thead);
  const tb=el('tbody'); let shown=0;
  wks.forEach(w=>{
    const list=byWk[w]||[];
    const searchText=[w].concat(list.map(g=>{
      const opp=g.home===team?g.away:g.home; const ha=g.home===team?'home':'away';
      return ha+' '+opp+' '+g.venue;
    })).join(' ');
    if(SEARCH && !searchText.toLowerCase().includes(SEARCH.toLowerCase())) return;
    shown++;
    const tr=el('tr');
    tr.appendChild(el('td','wk',w));

    // games-played count for this weekend
    const gp=el('td','gp');
    if(list.length){ gp.appendChild(el('span','gp-badge', String(list.length))); }
    else { gp.className='gp bye'; gp.textContent='0'; }
    tr.appendChild(gp);

    const td=el('td');
    if(!list.length){ td.className='bye'; td.appendChild(el('span','tag bye','BYE')); td.appendChild(document.createTextNode(' No games this weekend')); }
    else{
      // Destination: teams may split across venues in a weekend, so show each distinct venue.
      const cls=regionClass(list[0].venue); if(cls) td.className=cls;
      // group this weekend's games by venue so the destination is stated once, clearly
      const byVenue={};
      list.forEach(g=>{ (byVenue[g.venue]=byVenue[g.venue]||[]).push(g); });
      Object.keys(byVenue).forEach(venue=>{
        const gs=byVenue[venue];
        const isHome=gs[0].home===team;   // home/away is per-venue for this team
        const [city,arena]=splitVenue(venue);
        const dest=el('div','dest');
        // Big, clear destination line: HOME/AWAY tag + "at CITY — Arena"
        const head=el('div','dest-head');
        head.appendChild(el('span','tag '+(isHome?'home':'away'), isHome?'HOME':'AWAY'));
        const place=el('span','dest-place');
        place.appendChild(el('span','dest-city', city||arena||'TBD'));
        if(arena && city){ place.appendChild(el('span','dest-arena',' · '+arena)); }
        head.appendChild(place);
        // travel indicator
        const trav=el('span','dest-travel'+(isHome?' home':''), isHome ? 'playing at home' : 'travels to '+(city||arena||'TBD'));
        head.appendChild(trav);
        dest.appendChild(head);
        // opponents at this venue
        const opps=gs.map(g=>g.home===team?g.away:g.home);
        const oppLine=el('div','dest-opps');
        oppLine.appendChild(el('span','dest-vs','vs '));
        oppLine.appendChild(document.createTextNode(opps.join(', ')));
        oppLine.appendChild(el('span','dest-count','  ('+gs.length+' game'+(gs.length===1?'':'s')+')'));
        dest.appendChild(oppLine);
        td.appendChild(dest);
      });
    }
    tr.appendChild(td); tb.appendChild(tr);
  });
  t.appendChild(tb); wrap.appendChild(t); c.appendChild(wrap);
  $('#rowCount').textContent=shown+' weekend'+(shown===1?'':'s');
}

// ---------- controls ----------
$('#search').addEventListener('input',e=>{ SEARCH=e.target.value; render();
  requestAnimationFrame(()=>{ const n=$('#search'); n.focus(); n.setSelectionRange(n.value.length,n.value.length); }); });

$('#fileInput').addEventListener('change',ev=>{
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const rdr=new FileReader();
  rdr.onload=()=>{
    try{
      const parsed=JSON.parse(rdr.result);
      const games=Array.isArray(parsed)?parsed:parsed.games;
      if(!Array.isArray(games)||!games.length) throw new Error('No "games" array found in this file.');
      const s=games[0];
      if(!('division' in s)||!('weekend' in s)||!('venue' in s)) throw new Error('Games are missing expected fields (division / weekend / venue).');
      GAMES=gamesFromUpload(games); SRC='upload'; VIEW={type:'all'}; SEARCH='';
      const stamp=(parsed.stamp||'')+(parsed.exported?(' · '+parsed.exported.slice(0,16).replace('T',' ')):'');
      $('#srcLabel').textContent='Loaded: '+f.name+(stamp?(' ('+stamp+')'):'');
      $('#resetBtn').hidden=false; clearErr(); render();
    }catch(e){ showErr('Could not read that schedule: '+e.message+' — expecting a JSON file with a "games" list (like the FSL schedule export).'); }
    ev.target.value='';
  };
  rdr.onerror=()=>showErr('Failed to read the file.'); rdr.readAsText(f);
});
$('#resetBtn').addEventListener('click',()=>{
  GAMES=gamesFromBuiltin(); SRC='builtin'; VIEW={type:'all'}; SEARCH='';
  $('#srcLabel').textContent=''; $('#resetBtn').hidden=true; clearErr(); render();
});
function showErr(msg){ let e=$('#err'); if(!e){ e=el('div','err'); e.id='err'; $('#content').prepend(e); } e.textContent=msg; }
function clearErr(){ const e=$('#err'); if(e) e.remove(); }

render();
</script>
</body>
</html>
