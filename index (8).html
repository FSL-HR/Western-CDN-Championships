<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSL Schedule — View Only</title>
<style>
:root{
  --blk:#0a0a0a; --blk2:#161616; --blk3:#1f1f1f;
  --red:#C81E28; --red-d:#9c151d; --red-l:#e6404a;
  --wht:#ffffff; --paper:#f4f4f5; --line:#2a2a2a; --line-l:#e3e3e6;
  --txt:#0a0a0a; --txt-i:#f4f4f5; --mut:#8a8a90; --mut-d:#5a5a60;
  --ok:#1d9e75; --okbg:#e1f5ee; --warn:#BA7517; --warnbg:#FAEEDA;
  --danger:#C81E28; --dangerbg:#FCEBEB;
  --sb:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper);color:var(--txt);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.skew{transform:skewX(-9deg)}
.unskew{display:inline-block;transform:skewX(9deg)}

/* SIDEBAR */
.sidebar{width:var(--sb);background:var(--blk);color:var(--txt-i);flex-shrink:0;
  position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
.brand .brandlogo{display:block;width:100%;max-width:196px;height:auto;margin:0 0 2px}
.brand .logo{display:flex;align-items:center;gap:0}
.brand .fsl{font-style:italic;font-weight:800;letter-spacing:-1px;font-size:30px;line-height:.9;
  color:#fff;transform:skewX(-8deg)}
.brand .fsl .s{color:var(--red)}
.brand .star{color:var(--red);font-size:20px;margin-right:2px;transform:translateY(-2px)}
.brand .sub{font-size:8.5px;font-weight:700;letter-spacing:3px;color:var(--mut);margin-top:4px;
  text-transform:uppercase}
.brand .ctx{font-size:10px;color:var(--red-l);font-weight:600;letter-spacing:.5px;margin-top:8px;text-transform:uppercase}

.navsec{padding:12px 12px 4px}
.navsec h4{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut-d);
  font-weight:700;padding:0 8px 6px}
.navitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;color:#d4d4d8;
  font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:.12s}
.navitem:hover{background:var(--blk3);color:#fff}
.navitem.on{background:var(--red);color:#fff}
.navitem .ic{width:16px;text-align:center;font-size:14px;opacity:.85}
.navitem.on .ic{opacity:1}

.wk-list{padding:2px 12px 12px}
.wk{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;
  font-size:12.5px;color:#cfcfd4;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.wk:hover{background:var(--blk3);color:#fff}
.wk.on{background:var(--blk3);color:#fff;box-shadow:inset 2px 0 0 var(--red)}
.wk .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wk .nm{flex:1;font-weight:600;font-variant-numeric:tabular-nums}
.wk .ct{font-size:10.5px;color:var(--mut);font-variant-numeric:tabular-nums}
.wk.on .ct{color:#d4d4d8}

.ice-btn{margin:8px 14px 14px;padding:13px;background:linear-gradient(180deg,var(--red),var(--red-d));
  border:none;border-radius:9px;color:#fff;display:flex;align-items:center;gap:11px;width:calc(100% - 28px);
  box-shadow:0 2px 0 #6f0f15}
.ice-btn:hover{filter:brightness(1.08)}
.ice-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #6f0f15}
.ice-btn .big{font-size:20px}
.ice-btn .l1{font-size:13.5px;font-weight:800;letter-spacing:.3px}
.ice-btn .l2{font-size:9.5px;opacity:.85;letter-spacing:.6px;text-transform:uppercase;font-weight:600}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--blk);color:#fff;padding:0 26px;height:54px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:30;border-bottom:2px solid var(--red)}
.topbar .crumb{font-size:12px;color:var(--mut);font-weight:600;letter-spacing:.4px}
.topbar .crumb b{color:#fff;font-weight:700}
.topbar .acts{display:flex;gap:9px}
.tb-btn{background:var(--blk3);border:1px solid var(--line);color:#e4e4e7;padding:7px 13px;border-radius:7px;
  font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.tb-btn:hover{background:#2c2c2c;border-color:#3a3a3a}
.tb-btn.red{background:var(--red);border-color:var(--red);color:#fff}
.tb-btn.red:hover{background:var(--red-l)}

.content{padding:26px 30px 60px;flex:1;max-width:1400px;width:100%}

/* HERO / DASH */
.hero{background:var(--blk);border-radius:16px;padding:30px 32px;color:#fff;position:relative;overflow:hidden;
  margin-bottom:22px}
.hero::after{content:'';position:absolute;right:-60px;top:-40px;width:340px;height:340px;
  background:radial-gradient(circle,rgba(200,30,40,.22),transparent 62%)}
.hero::before{content:'';position:absolute;left:0;bottom:0;width:100%;height:4px;
  background:linear-gradient(90deg,var(--red),transparent)}
.hero h1{font-size:27px;font-weight:800;letter-spacing:-.4px;position:relative;z-index:1}
.hero h1 .r{color:var(--red-l)}
.hero p{color:#b4b4ba;font-size:14px;margin-top:7px;max-width:560px;position:relative;z-index:1}
.hero .stat-row{display:flex;gap:30px;margin-top:22px;position:relative;z-index:1;flex-wrap:wrap}
.hstat .n{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.hstat .n.red{color:var(--red-l)}
.hstat .l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-top:2px}

.grid{display:grid;gap:16px}
.cards4{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.cards3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.card{background:#fff;border:1px solid var(--line-l);border-radius:13px;padding:18px 20px}
.card h3{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mut-d);font-weight:700;
  display:flex;align-items:center;gap:7px;margin-bottom:13px}
.card h3 .ic{color:var(--red);font-size:13px}

.sectionhead{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px}
.sectionhead h2{font-size:18px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px}
.sectionhead h2 .bar{width:4px;height:19px;background:var(--red);border-radius:2px;transform:skewX(-9deg)}

.tile{background:#fff;border:1px solid var(--line-l);border-radius:11px;padding:15px 16px;cursor:pointer;
  transition:.12s;text-align:left;display:block;width:100%}
.tile:hover{border-color:var(--red);box-shadow:0 3px 14px rgba(200,30,40,.09);transform:translateY(-1px)}
.tile .dh{display:flex;align-items:center;justify-content:space-between}
.tile .dn{font-size:15px;font-weight:800;letter-spacing:-.2px}
.tile .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--blk);color:#fff}
.tile .meta{font-size:11.5px;color:var(--mut-d);margin-top:7px;display:flex;gap:13px}
.tile .meta b{color:var(--txt);font-weight:700}
.tile .prog{height:5px;background:var(--line-l);border-radius:3px;margin-top:11px;overflow:hidden}
.tile .prog i{display:block;height:100%;background:var(--red);border-radius:3px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line-l);border-radius:11px;
  overflow:hidden;font-size:13px}
.tbl th{background:var(--blk);color:#cfcfd4;text-align:left;padding:10px 13px;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.9px;font-weight:700}
.tbl td{padding:9px 13px;border-top:1px solid var(--line-l);font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:var(--paper)}
.tbl .tm{font-weight:700}
.tlink{display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--paper);
  border:1px solid var(--line-l);border-radius:7px;padding:5px 11px;font-weight:700;color:var(--txt);
  font-size:13px;transition:.12s;text-decoration:none}
.tlink:hover{background:var(--red);border-color:var(--red);color:#fff;transform:translateX(2px)}
.tlink::after{content:'›';font-size:15px;color:var(--red);font-weight:800;margin-left:auto;transition:.12s}
.tlink:hover::after{color:#fff}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.pill.ab{background:#eef;color:#3338a0}.pill.bc{background:#e1f5ee;color:#0f6e56}
.pill.skmb{background:#FAEEDA;color:#854f0b}
.pill.fly{background:var(--dangerbg);color:var(--red-d)}
.pill.school{background:#EEEDFE;color:#3C3489}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;
  border-radius:7px;background:var(--paper);border:1px solid var(--line-l)}

/* WEEKEND VIEW */
.wk-head{background:var(--blk);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.wk-head::before{content:'';position:absolute;left:0;top:0;height:100%;width:5px;background:var(--red)}
.wk-head h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.wk-head .dt{color:var(--mut);font-size:13px;margin-top:3px;font-weight:600}
.venue-block{background:#fff;border:1px solid var(--line-l);border-radius:12px;margin-bottom:14px;overflow:hidden}
.venue-top{padding:13px 17px;background:var(--paper);border-bottom:1px solid var(--line-l);
  display:flex;align-items:center;justify-content:space-between}
.venue-top .vn{font-size:15px;font-weight:800}
.venue-top .vn .new{font-size:9.5px;background:var(--warnbg);color:var(--warn);padding:2px 7px;border-radius:5px;
  margin-left:8px;font-weight:700;letter-spacing:.4px}
.slots{display:flex;gap:7px}
.slot{text-align:center;background:#fff;border:1px solid var(--line-l);border-radius:7px;padding:5px 11px;min-width:58px}
.slot .d{font-size:9px;color:var(--mut-d);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.slot .v{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.slot.full{border-color:var(--red);background:var(--dangerbg)}.slot.full .v{color:var(--red-d)}
.slot.over{background:var(--red);border-color:var(--red)}.slot.over .v,.slot.over .d{color:#fff}
.venue-games{padding:6px 17px 14px}
.day-grp{margin-top:9px}
.day-grp .dlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--mut-d);
  font-weight:700;padding:7px 0 4px;border-bottom:1px dashed var(--line-l);margin-bottom:5px}
.gline{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:7px;font-size:12.5px}
.gline:hover{background:var(--paper)}
.gline .gd{font-size:10px;font-weight:700;color:#fff;background:var(--blk);padding:2px 7px;border-radius:5px;
  width:54px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.gline .gdiv{font-size:9.5px;font-weight:800;color:var(--red);width:58px;flex-shrink:0;letter-spacing:.3px}
.gline .gm{flex:1;font-weight:600}
.gline .gm .vs{color:var(--mut-d);font-weight:600;font-size:11px;margin:0 4px}
.gline .del{opacity:0;background:none;border:none;color:var(--red);font-size:14px;padding:2px 6px}
.gline:hover .del{opacity:1}
.addgame{margin:9px 0 2px;background:none;border:1.5px dashed var(--line-l);border-radius:8px;padding:9px;
  width:100%;color:var(--mut-d);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:7px}
.addgame:hover{border-color:var(--red);color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--mut-d)}
.empty .ic{font-size:34px;color:var(--line-l)}
.empty h3{font-size:15px;color:var(--txt);margin:10px 0 4px;font-weight:700}

/* CONFLICTS */
.conf-banner{border-radius:11px;padding:13px 17px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:13px}
.conf-banner.bad{background:var(--dangerbg);border:1px solid #f0b4b4;color:var(--red-d)}
.conf-banner.good{background:var(--okbg);border:1px solid #9fe1cb;color:#0f6e56}
.conf-banner .ic{font-size:20px}
.conf-banner b{font-weight:800}
.conf-list{list-style:none}
.conf-item{display:flex;gap:11px;padding:11px 14px;border:1px solid var(--line-l);border-radius:9px;
  margin-bottom:8px;background:#fff;font-size:13px;align-items:flex-start}
.conf-item .sev{font-size:9px;font-weight:800;padding:3px 7px;border-radius:5px;text-transform:uppercase;
  letter-spacing:.4px;flex-shrink:0;margin-top:1px}
.conf-item .sev.hard{background:var(--dangerbg);color:var(--red-d)}
.conf-item .sev.soft{background:var(--warnbg);color:var(--warn)}
.conf-item .ctx{font-size:11px;color:var(--mut-d);margin-top:2px}

/* MODAL */
.modal-bg{position:absolute;inset:0;background:rgba(10,10,10,.55);display:flex;align-items:flex-start;
  justify-content:center;padding:60px 20px;z-index:100}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-h{background:var(--blk);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:between;gap:12px}
.modal-h h3{font-size:15px;font-weight:800;flex:1}
.modal-h .x{background:var(--blk3);border:none;color:#fff;width:28px;height:28px;border-radius:7px;font-size:16px}
.modal-b{padding:20px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut-d);
  font-weight:700;margin-bottom:6px}
.fld select,.fld input{width:100%;padding:10px 12px;border:1px solid var(--line-l);border-radius:8px;
  font-size:14px;font-family:inherit;background:#fff}
.fld select:focus,.fld input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(200,30,40,.12)}
.fld-row{display:flex;gap:10px}.fld-row .fld{flex:1}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line-l);display:flex;gap:9px;justify-content:flex-end;background:var(--paper)}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid var(--line-l);background:#fff}
.btn:hover{background:var(--paper)}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.btn.primary:hover{background:var(--red-l)}
.live-warn{background:var(--warnbg);border:1px solid #fac77f;border-radius:8px;padding:9px 12px;
  font-size:11.5px;color:var(--warn);margin-top:6px;display:none}
.live-warn.show{display:block}
.live-warn b{font-weight:800}

.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--mut-d);margin-top:10px}
.legend span{display:flex;align-items:center;gap:5px}
.legend .sw{width:11px;height:11px;border-radius:3px}

@media(max-width:880px){
  .sidebar{position:fixed;left:-260px;transition:.2s;z-index:200}
  .sidebar.open{left:0}
  .content{padding:18px 16px 50px}
}
.mobonly{display:none}
@media(max-width:880px){.mobonly{display:flex}}
</style>
</head>

function restore(s){try{const o=JSON.parse(s);games=o.games||[];gid=o.gid||1;}catch(e){}}

/* ============ HELPERS ============ */
const teamsByDiv = d => DATA.teams.filter(t=>t.division===d).map(t=>t.name);
const DIVS = [...new Set(DATA.teams.map(t=>t.division))];
const teamObj = (nm,div) => DATA.teams.find(t=>t.name===nm && (!div||t.division===div));
const tdisp = (nm,div) => div ? `${nm} — ${div}` : nm;
// A venue/day with more than 6 available slots physically requires 2 sheets of ice.
function sheetsForCap(capCount){ return Math.max(1, Math.ceil(capCount/6)); }
function sheetsForVenueDay(wk,venue,day){
  const v=DATA.venues.find(x=>x.weekend===wk && x.venue===venue);
  if(!v) return 1;
  const cap={Fri:v.capFri,Sat:v.capSat,Sun:v.capSun}[day]||0;
  return sheetsForCap(cap);
}
const venuesFor = wk => DATA.venues.filter(v=>v.weekend===wk);
const gamesFor = wk => games.filter(g=>g.weekend===wk);
const isFlying = nm => {const t=DATA.teams.find(x=>x.name===nm);return t&&t.flying;};
const slotHours = div => CFG.slotHours[div]||2;
const maxDay = div => CFG.maxPerDay[div]||CFG.maxPerDay.default;
const perShow = div => CFG.gamesPerShowcase[div]||CFG.gamesPerShowcase.default;
const gameTarget = div => CFG.gameCount[div]||CFG.gameCount.default;
function regClass(r){return r==='AB'?'ab':r==='BC'?'bc':'skmb';}

/* A game only counts as "scheduled" once it has a real weekend date.
   Excludes Midweek rivalry games, Flex, and TBD/unplaced games — those
   populate the counts as they get assigned to a weekend. */
const isPlaced = g => WK.includes(g.weekend);
/* A parked / "date & time TBD" game: held in the parking garage with no venue slot.
   These must NOT be grouped under a weekend in itineraries — they show in a TBD bucket. */
function isParkedGame(g){
  try{ if(typeof PG!=='undefined' && PG && PG.isParked) return PG.isParked(g); }catch(e){}
  return WK.includes(g.weekend) && (!g.venue || String(g.venue).trim()==='');
}
/* team scheduled game count */
function teamGameCount(nm,div){return games.filter(g=>(g.home===nm||g.away===nm)&&g.division===div&&isPlaced(g)).length;}
function teamWeekends(nm,div){return [...new Set(games.filter(g=>(g.home===nm||g.away===nm)&&g.division===div).map(g=>g.weekend))];}
/* Item 2: 16U/19U games need 2.25h of ice. Flag any that ended up on a slot shorter than
   required (e.g. a 2-hour slot). Returns true only for divisions needing more than 2h. */
function slotTooShort(g){
  if(!g||!g.time||!g.endTime) return false;
  const need=Math.round(slotHours(g.division)*60);
  if(need<=120) return false;
  const pm=t=>{const m=/^(\d{1,2}):(\d{2})/.exec(String(t));return m?(+m[1])*60+(+m[2]):null;};
  const a=pm(g.time), b=pm(g.endTime); if(a==null||b==null) return false;
  let d=b-a; if(d<0)d+=1440;
  return d>0 && d<need;
}

/* ============ CONFLICT ENGINE ============ */
function detectConflicts(scope){
  // scope: undefined=all, or {weekend}
  const out=[];
  const pool = scope&&scope.weekend ? gamesFor(scope.weekend) : games;

  // capacity per venue/day
  const capMap={};
  DATA.venues.forEach(v=>{capMap[v.weekend+'|'+v.venue]={Fri:v.capFri,Sat:v.capSat,Sun:v.capSun};});
  const used={};
  pool.forEach(g=>{const k=g.weekend+'|'+g.venue+'|'+g.day;used[k]=(used[k]||0)+1;});
  Object.entries(used).forEach(([k,n])=>{
    const [wk,vn,day]=k.split('|');
    const cap=(capMap[wk+'|'+vn]||{})[day];
    if(cap!=null && n>cap) out.push({sev:'hard',rule:'Ice capacity',
      msg:`${vn} ${day} (${wk}) is over capacity: ${n} games on ${cap} slots.`,wk});
  });
  // concurrent games at same venue/day/time may not exceed the number of sheets
  const slotCount={};
  pool.forEach(g=>{if(g.time){const k=g.weekend+'|'+g.venue+'|'+g.day+'|'+g.time;slotCount[k]=(slotCount[k]||0)+1;}});
  Object.entries(slotCount).forEach(([k,n])=>{
    const [wk,vn,day,time]=k.split('|');
    const sheets=sheetsForVenueDay(wk,vn,day);
    if(n>sheets) out.push({sev:'hard',rule:'Sheet clash',
      msg:`${vn} ${day} ${time} (${wk}) has ${n} games at once but only ${sheets} sheet${sheets>1?'s':''} of ice.`,wk});
  });

  // per team per day & per weekend & rest & 19U one-per-day
  const byTeamWkDay={}, byTeamWk={};
  pool.forEach(g=>{
    [g.home,g.away].forEach(tm=>{
      if(g.day && DAYS.includes(g.day)){ // day-based limits only apply once a day is assigned
        const dk=g.division+'~'+tm+'~'+g.weekend+'~'+g.day;
        (byTeamWkDay[dk]=byTeamWkDay[dk]||[]).push(g);
      }
      const wk=g.division+'~'+tm+'~'+g.weekend;
      (byTeamWk[wk]=byTeamWk[wk]||[]).push(g);
    });
  });
  Object.entries(byTeamWkDay).forEach(([k,gs])=>{
    const [div,tm,wk,day]=k.split('~');
    const lim=maxDay(div);
    if(gs.length>lim) out.push({sev:'hard',rule:'Max games/day',
      msg:`${tm} (${div}) has ${gs.length} games on ${day} ${wk} — limit is ${lim}.`,wk});
    // rest between same-team games (only matters when 2 same day)
    if(div!=='19U AAA' && gs.length>=2 && gs.every(g=>g.time)){
      const times=gs.map(g=>toMin(g.time)).sort((a,b)=>a-b);
      for(let i=1;i<times.length;i++){
        const gapH=(times[i]-times[i-1])/60;
        const needed=(CFG.restHours[div]||3);
        if(gapH<needed) out.push({sev:'hard',rule:'Rest gap',
          msg:`${tm} (${div}) games ${day} ${wk} only ${gapH.toFixed(1)}h apart — needs ${needed}h.`,wk});
      }
    }
  });
  Object.entries(byTeamWk).forEach(([k,gs])=>{
    const [div,tm,wk]=k.split('~');
    const lim=perShow(div);
    if(gs.length>lim) out.push({sev:'hard',rule:'Games/showcase',
      msg:`${tm} (${div}) has ${gs.length} games in ${wk} — showcase max is ${lim}.`,wk});
  });

  // matchup repeated >2 in a weekend
  const pairWk={};
  pool.forEach(g=>{
    const pair=[g.home,g.away].sort().join(' vs ');
    const k=g.division+'~'+g.weekend+'~'+pair;
    pairWk[k]=(pairWk[k]||0)+1;
  });
  Object.entries(pairWk).forEach(([k,n])=>{
    if(n>CFG.matchupRepeatPerWeekendMax){
      const [div,wk,pair]=k.split('~');
      out.push({sev:'soft',rule:'Repeat matchup',
        msg:`${pair} (${div}) scheduled ${n}× in ${wk} — max ${CFG.matchupRepeatPerWeekendMax} per weekend.`,wk});
    }
  });

  // flying teams at Lloydminster
  pool.forEach(g=>{
    if(/Lloyd/i.test(g.venue) && (isFlying(g.home)||isFlying(g.away))){
      const who=[g.home,g.away].filter(isFlying).join(', ');
      out.push({sev:'soft',rule:'Flying team @ Lloydminster',
        msg:`${who} normally flies but is booked at ${g.venue} (no airport — bus trip) — ${g.weekend}.`,wk:g.weekend});
    }
  });

  // Grande Prairie restriction
  pool.forEach(g=>{
    if(/Grande Prairie/i.test(g.venue)){
      const bad=[g.home,g.away].filter(t=>!CFG.grandePrairieAllowed.some(a=>t.startsWith(a)));
      if(bad.length) out.push({sev:'hard',rule:'Grande Prairie',
        msg:`${bad.join(', ')} not permitted at Grande Prairie — ${g.weekend}.`,wk:g.weekend});
    }
  });

  // no THREE consecutive CALENDAR weekends per team (back-to-back pairs are allowed).
  // Uses real dates: two weekends are "consecutive" only if their actual dates are <=8 days apart.
  // This correctly treats the holiday gap (Dec 11 -> Jan 08 = 28 days) as NON-consecutive.
  const WKDATE={'Sep 11':'2026-09-11','Sep 18':'2026-09-18','Sep 25':'2026-09-25','Oct 02':'2026-10-02','Oct 09':'2026-10-09','Oct 16':'2026-10-16','Oct 23':'2026-10-23','Oct 30':'2026-10-30','Nov 06':'2026-11-06','Nov 13':'2026-11-13','Nov 20':'2026-11-20','Nov 27':'2026-11-27','Dec 04':'2026-12-04','Dec 11':'2026-12-11','Jan 02':'2027-01-02','Jan 08':'2027-01-08','Jan 15':'2027-01-15','Jan 22':'2027-01-22','Jan 23':'2027-01-22','Jan 29':'2027-01-29','Feb 05':'2027-02-05','Feb 12':'2027-02-12','Feb 19':'2027-02-19'};
  const dayNum=w=>{const d=WKDATE[w];return d?Math.round(new Date(d+'T00:00:00Z').getTime()/86400000):null;};
  DATA.teams.forEach(t=>{
    const wnames=[...new Set(teamWeekends(t.name,t.division).filter(w=>WKDATE[w]))]
      .sort((a,b)=>dayNum(a)-dayNum(b));
    for(let i=2;i<wnames.length;i++){
      const d0=dayNum(wnames[i-2]),d1=dayNum(wnames[i-1]),d2=dayNum(wnames[i]);
      if(d1-d0<=8 && d2-d1<=8){
        const trio=[wnames[i-2],wnames[i-1],wnames[i]];
        if(!scope||!scope.weekend||trio.includes(scope.weekend))
          out.push({sev:'hard',rule:'Three straight weekends',
            msg:`${t.name} (${t.division}) plays ${trio.join(', ')} — three consecutive calendar weekends is not allowed.`,wk:trio[2]});
      }
    }
  });

  // blackout & venue-restriction rules
  pool.forEach(g=>{
    if(g.weekend==='Jan 02')
      out.push({sev:'hard',rule:'Blackout',msg:`Jan 02 is a league-wide blackout — remove ${g.home} vs ${g.away} (${g.division}).`,wk:g.weekend});
    if(['Nov 20','Dec 11'].includes(g.weekend) && ['16U AAA','16U AA','19U AAA'].includes(g.division))
      out.push({sev:'hard',rule:'Blackout',msg:`${g.weekend} is blacked out for ${g.division} — remove ${g.home} vs ${g.away}.`,wk:g.weekend});
    if(g.venue.includes('Archie Miller') && g.division!=='12U AAA')
      out.push({sev:'hard',rule:'Venue restriction',msg:`Archie Miller Arena is 12U AAA only — ${g.division} ${g.home} vs ${g.away} not permitted.`,wk:g.weekend});
    if((g.home.startsWith('Purcell')||g.away.startsWith('Purcell')) && ['Nov 06','Jan 08','Jan 15'].includes(g.weekend))
      out.push({sev:'hard',rule:'Blackout',msg:`Purcell Collegiate is blacked out ${g.weekend} — remove ${g.home} vs ${g.away}.`,wk:g.weekend});
    if(clusterName(g.venue)==='Winnipeg' && !['Sep 25','Oct 09','Nov 06','Jan 08'].includes(g.weekend))
      out.push({sev:'hard',rule:'Winnipeg ice',msg:`Winnipeg ice is only available Sep 25, Oct 9, Nov 6 and Jan 8 — ${g.home} vs ${g.away} is on ${g.weekend}.`,wk:g.weekend});
    if(/WEM Ice Palace/i.test(g.venue) && g.division!=='12U AAA')
      out.push({sev:'hard',rule:'WEM 12U-only',msg:`WEM Ice Palace is reserved for 12U AAA — ${g.division} game ${g.home} vs ${g.away} (${g.weekend}).`,wk:g.weekend});
  });

  // host present per division-group in a venue (soft-ish but listed hard per rules)
  // host = a team whose homeCluster matches the venue cluster
  const vk={};
  pool.forEach(g=>{(vk[g.weekend+'|'+g.venue+'|'+g.division]=vk[g.weekend+'|'+g.venue+'|'+g.division]||[]).push(g);});
  Object.entries(vk).forEach(([k,gs])=>{
    const [wk,vn,div]=k.split('|');
    const cl=clusterName(vn);
    const teamsHere=new Set();gs.forEach(g=>{teamsHere.add(g.home);teamsHere.add(g.away);});
    const hasHost=[...teamsHere].some(tm=>{const t=DATA.teams.find(x=>x.name===tm&&x.division===div);return t&&t.homeCluster===cl;});
    if(!hasHost && !/NEW/i.test(vn))
      out.push({sev:'soft',rule:'Host present',
        msg:`No host club from ${cl||vn} in ${div} at ${vn} (${wk}).`,wk});
  });

  // Cowichan once-per-season cap (exempt Cowichan-home and Lower Mainland teams)
  const cowVisits={};
  pool.forEach(g=>{
    if(clusterName(g.venue)==='Cowichan'){
      [g.home,g.away].forEach(tm=>{
        const t=DATA.teams.find(x=>x.name===tm&&x.division===g.division);
        if(t && t.homeCluster!=='Cowichan' && t.homeCluster!=='Lower Mainland'){
          const k=g.division+'~'+tm;
          (cowVisits[k]=cowVisits[k]||new Set()).add(g.weekend);
        }
      });
    }
  });
  Object.entries(cowVisits).forEach(([k,wks])=>{
    if(wks.size>2){
      const [div,tm]=k.split('~');
      out.push({sev:'hard',rule:'Cowichan trip cap',
        msg:`${tm} (${div}) visits Cowichan ${wks.size}× — teams may make at most two Cowichan trips per season.`,wk:[...wks][0]});
    }
  });

  // Item 2: 16U/19U games need 2.25h; flag any sitting on a slot shorter than required (e.g. 2h).
  pool.forEach(g=>{ if(slotTooShort(g)) out.push({sev:'soft',rule:'Slot too short',
    msg:`${g.division}: ${g.home} vs ${g.away} at ${g.venue.replace(/\s*\(NEW\)/i,'')} ${g.day||''} ${g.time||''} (${g.weekend}) is on a 2-hour slot but needs ${slotHours(g.division)}h.`,wk:g.weekend}); });

  out.forEach(c=>{ c.id=confId(c); c.ack=!!(CONFLICT_ACK&&CONFLICT_ACK[c.id]); });
  return out;
}
function clusterName(vn){
  // venue names are now full arena strings like "Edmonton — Silent Ice Center (Hatch+Hesco)";
  // take the leading city token (before an em/en dash) and map it to its cluster.
  const v=vn.replace(/\s*\(NEW\)/i,'').trim();
  const city=v.split(/\s*[—–-]\s*/)[0].trim();
  const map={'Calgary':'Calgary-area','Calgary-area':'Calgary-area','Cochrane':'Calgary-area','Canmore':'Calgary-area','Banff':'Calgary-area',
    'Grand Prairie':'Calgary-area','Grande Prairie':'Calgary-area',
    'Edmonton':'Edmonton','Aberdeen':'Aberdeen','Lloydminster':'Lloydminster','Winnipeg':'Winnipeg',
    'Abbotsford':'Lower Mainland','Delta':'Lower Mainland','Lower Mainland':'Lower Mainland',
    'Cowichan':'Cowichan','Kimberley':'Kimberley'};
  return map[city]||map[v]||city;
}
const ALL_CLUSTERS=['Edmonton','Calgary-area','Lloydminster','Aberdeen','Winnipeg','Lower Mainland','Cowichan','Kimberley'];
const CLUSTER_REGION={'Edmonton':'AB','Calgary-area':'AB','Lloydminster':'AB','Aberdeen':'SK/MB','Winnipeg':'SK/MB','Lower Mainland':'BC','Cowichan':'BC','Kimberley':'BC'};
const LOCAL_DRIVE={ // within ~3h drive of each other
  'Edmonton':['Calgary-area','Lloydminster'],'Calgary-area':['Edmonton','Lloydminster','Kimberley'],
  'Lloydminster':['Edmonton','Calgary-area','Aberdeen'],'Aberdeen':['Lloydminster'],
  'Lower Mainland':['Cowichan'],'Cowichan':['Lower Mainland'],'Kimberley':['Calgary-area'],'Winnipeg':[]
};
// classify travel from a team's home cluster to a destination cluster
function travelType(homeCl,destCl){
  if(homeCl===destCl) return 'HOME';
  // Kimberley drives everywhere
  if(homeCl==='Kimberley'||destCl==='Kimberley'){
    return (CLUSTER_REGION[homeCl]===CLUSTER_REGION[destCl]||
            (LOCAL_DRIVE[homeCl]||[]).includes(destCl)||(LOCAL_DRIVE[destCl]||[]).includes(homeCl))
            ?'LOCAL':'REGIONAL';
  }
  // Winnipeg drives only to Aberdeen (Saskatoon) and Lloydminster; flies elsewhere
  const wpgDrive=['Aberdeen','Lloydminster'];
  if(homeCl==='Winnipeg') return wpgDrive.includes(destCl)?'REGIONAL':'FLY';
  if(destCl==='Winnipeg') return wpgDrive.includes(homeCl)?'REGIONAL':'FLY';
  const hr=CLUSTER_REGION[homeCl], dr=CLUSTER_REGION[destCl];
  // BC coast/island <-> non-BC = fly
  const bcCoast=c=>c==='Lower Mainland'||c==='Cowichan';
  if((bcCoast(homeCl)&&dr!=='BC')||(bcCoast(destCl)&&hr!=='BC')) return 'FLY';
  if((LOCAL_DRIVE[homeCl]||[]).includes(destCl)) return 'LOCAL';
  // AB prairie clusters drive to Aberdeen and vice versa
  const abCl=c=>CLUSTER_REGION[c]==='AB';
  if((abCl(homeCl)&&destCl==='Aberdeen')||(abCl(destCl)&&homeCl==='Aberdeen')) return 'REGIONAL';
  if(hr===dr) return 'REGIONAL';
  return 'FLY';
}

function showToast(msg,tone){
  const colors={good:'var(--ok)',warn:'var(--warn)',bad:'var(--red)'};
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;'+
      'padding:13px 20px;border-radius:10px;color:#fff;font-weight:600;font-size:13px;max-width:520px;'+
      'box-shadow:0 8px 30px rgba(0,0,0,.25);transition:opacity .3s';
    document.getElementById('app').appendChild(el);}
  el.style.background=colors[tone]||'var(--blk)';
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>{el.style.opacity='0';},4200);
}
/* Unique game number, ordered by division then matchup pairing then game id, so every
   game has its own stable number and a matchup's repeat games land on consecutive numbers. */
let _matchNo=null;
function matchupNumbers(){
  if(_matchNo) return _matchNo;
  const numOf=g=>{const m=String(g.id).match(/\d+/);return m?parseInt(m[0],10):0;};
  const key=g=>[Math.max(0,DIVS.indexOf(g.division)), [g.home,g.away].slice().sort().join(' ~ '), numOf(g), String(g.id)];
  const sorted=games.slice().sort((a,b)=>{const ka=key(a),kb=key(b);for(let i=0;i<ka.length;i++){if(ka[i]<kb[i])return -1;if(ka[i]>kb[i])return 1;}return 0;});
  const map={};sorted.forEach((g,i)=>{map[String(g.id)]=i+1;});
  _matchNo=map;return map;
}
function matchNo(g){const n=matchupNumbers()[String(g.id)];return n?('#'+String(n).padStart(3,'0')):'';}
function render(){
  _matchNo=null;

  app.innerHTML = sidebar() + main();
  attachNav();

function attachNav(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick=()=>{const d=el.dataset; 
      if(d.nav==='weekend')view={type:'weekend',wk:d.wk};
      else if(d.nav==='division')view={type:'division',div:d.div};
      else if(d.nav==='team')view={type:'team',team:d.team,div:d.div};
      else view={type:d.nav};
      render();window.scrollTo(0,0);
    };
  });
  document.querySelectorAll('[data-act]').forEach(el=>{el.onclick=()=>{const a=el.dataset.act;if(MUTATING.has(a))pushUndo(a);ACTIONS[a](el.dataset);};});
  document.querySelectorAll('[data-actchange]').forEach(el=>{el.onchange=()=>{const a=el.dataset.actchange;if(MUTATING.has(a))pushUndo(a);ACTIONS[a](el);};});
  document.querySelectorAll('[data-actfile]').forEach(el=>{el.onchange=()=>ACTIONS[el.dataset.actfile](el);});
}

/* ============ MAIN ROUTER ============ */
function main(){
  let body,crumb;
  if(view.type==='dash'){body=dashView();crumb='<b>Dashboard</b>';}
  else if(view.type==='ice'){body=iceView();crumb='<b>Ice Allocation</b>';}
  else if(view.type==='import'){body=IMP.view();crumb='<b>Import times</b>';}
  else if(view.type==='exports'){body=XP.view();crumb='<b>Schedule exports</b>';}

function iceKey(wk,venue){return wk+'||'+venue;}

function saveLocked(){try{localStorage.setItem('fsl_locked_v1',JSON.stringify(LOCKED));}catch(e){}}

function isVenueLocked(wk,venue){return !!(LOCKED&&LOCKED[venueLockKey(wk,venue)]);}

function applyRemovedGames(){ if(!REMOVED_GAMES.length||typeof games==='undefined'||!Array.isArray(games)) return; const rm=new Set(REMOVED_GAMES.map(String)); for(let i=games.length-1;i>=0;i--){ if(rm.has(String(games[i].id))) games.splice(i,1); } }
// Acknowledged conflicts: user has reviewed/accepted these, so they drop out of the alert counts.

function confId(c){ const s=c.sev+'|'+c.rule+'|'+(c.wk||'')+'|'+c.msg; let h=5381; for(let i=0;i<s.length;i++){ h=((h*33)^s.charCodeAt(i))|0; } return 'c'+(h>>>0).toString(36); }
function iceEscA(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ============ ICE ALLOCATION ============ */
function realAvailTotal(wk,venue){
  // TRUE contracted ice for a venue-weekend: realIce inventory first,
  // else a "Real ice" venue record's caps minus any "+N sourced" tags in its status.
  const wkObj=(DATA.realIce&&DATA.realIce[wk])||null;
  if(wkObj&&wkObj[venue]) return (wkObj[venue].Fri||0)+(wkObj[venue].Sat||0)+(wkObj[venue].Sun||0);
  const v=DATA.venues.find(x=>x.weekend===wk&&x.venue===venue);
  if(v&&/^Real ice/.test(v.status||'')){
    let cap=v.capFri+v.capSat+v.capSun;
    (String(v.status).match(/\+(\d+)/g)||[]).forEach(m=>{cap-=parseInt(m.slice(1),10);});
    return Math.max(0,cap);
  }
  return 0;
}
function aberdeenExempt(wk){
  // League rule: Aberdeen weekends with fewer than 18 total games need NO sourced ice.
  return gamesFor(wk).filter(g=>clusterName(g.venue)==='Aberdeen').length<18;
}
function sourcedFor(wk,venue){
  const dec=iceDecision(wk,venue);
  if(dec==='del'||dec==='have') return 0;
  const used=gamesFor(wk).filter(g=>g.venue===venue).length;
  if(dec!=='no'&&clusterName(venue)==='Aberdeen'&&aberdeenExempt(wk)) return 0;
  const real=(dec==='no')?0:realAvailTotal(wk,venue);
  return Math.max(0,used-real);
}
function totalSourced(){
  let t=0;
  WK.forEach(wk=>{[...new Set(gamesFor(wk).map(g=>g.venue))].forEach(v=>{t+=sourcedFor(wk,v);});});
  return t;
}
// "This ice does not exist yet" — the venue-weekend has no real contracted ice we can count on:
// either the user flagged it "Need" (needs sourcing), or it isn't Real ice / has no real inventory.
// NOTE: this is NOT the same as "del" (a row the user explicitly removed/hid). Aberdeen <18-game
// weekends are exempt (league flex — no sourcing required), matching the sourcing math elsewhere.
function iceDoesNotExist(wk,venue){
  const dec=iceDecision(wk,venue);
  if(dec==='have') return false;              // user asserts they secured it
  if(dec==='no') return true;                 // user flagged it as needing sourcing
  if(clusterName(venue)==='Aberdeen' && aberdeenExempt(wk)) return false; // league flex
  return realAvailTotal(wk,venue)<=0;         // no real contracted ice
}
function askRegionBucket(venue){
  // Mirror the HSL trade-sheet region buckets so the app and the trade sheet agree.
  const city=clusterName(venue);
  if(['Calgary','Cochrane','Canmore','Banff','Calgary-area'].includes(city)) return 'Calgary Region';
  if(['Langley','Delta','Lower Mainland','Abbotsford','Vancouver','Cowichan','Victoria','Tri City'].includes(city)) return 'Lower Mainland';
  if(['Saskatoon','Aberdeen'].includes(city)) return 'Sask';
  if(city==='Grand Prairie'||city==='Grande Prairie') return 'Grande Prairie';
  return city; // Edmonton, Lloydminster, Kimberley, Winnipeg map to themselves
}
function sourcedByRegion(){
  const m={};
  WK.forEach(wk=>{[...new Set(gamesFor(wk).map(g=>g.venue))].forEach(v=>{
    const s=sourcedFor(wk,v);
    if(s>0){const b=askRegionBucket(v);m[b]=(m[b]||0)+s;}
  });});
  return m; // {region: slots}
}
function realIceOf(wk,venue,day){
  const wkObj=(DATA.realIce&&DATA.realIce[wk])||null;
  if(!wkObj) return 0;
  // exact venue key first (realIce is now keyed by full venue/arena name)
  if(wkObj[venue]) return wkObj[venue][day]||0;
  // fallback: sum any keys that map to the same cluster as this venue
  const cl=clusterName(venue);
  let total=0,found=false;
  Object.keys(wkObj).forEach(k=>{ if(clusterName(k)===cl){found=true;total+=(wkObj[k][day]||0);} });
  return found?total:0;
}
function unusedIceView(){
  // Spare REAL ice: contracted slots (realIce inventory + "Real ice" records) with no game on them.
  const rows=[];let totalUnused=0;
  const seen=new Set();
  const push=(wk,venue)=>{
    const k=wk+'|'+venue; if(seen.has(k))return; seen.add(k);
    const real=realAvailTotal(wk,venue); if(real<=0)return;
    const used=gamesFor(wk).filter(g=>g.venue===venue).length;
    const free=Math.max(0,real-used);
    if(free>0){totalUnused+=free;
      const wkObj=(DATA.realIce&&DATA.realIce[wk]&&DATA.realIce[wk][venue])||null;
      const usedD={Fri:0,Sat:0,Sun:0};
      gamesFor(wk).filter(g=>g.venue===venue&&g.day).forEach(g=>{usedD[g.day]=(usedD[g.day]||0)+1;});
      rows.push({wk,venue,real,used,free,day:wkObj,usedD});}
  };
  (DATA.realIce?Object.keys(DATA.realIce):[]).forEach(wk=>Object.keys(DATA.realIce[wk]).forEach(v=>push(wk,v)));
  DATA.venues.filter(v=>/^Real ice/.test(v.status||'')).forEach(v=>push(v.weekend,v.venue));
  rows.sort((a,b)=>WK.indexOf(a.wk)-WK.indexOf(b.wk)||a.venue.localeCompare(b.venue));
  const body=rows.map(r=>{
    const dayTxt=r.day?['Fri','Sat','Sun'].map(d=>`${d.slice(0,1)} ${Math.max(0,(r.day[d]||0))}`).join(' \u00b7 '):'\u2014';
    return `<tr>
    <td><b>${r.wk}</b> <span style="font-size:10.5px;color:var(--mut-d)">${wkDateShort(r.wk)}</span></td><td class="tm">${r.venue}</td>
    <td>${r.real}</td><td>${r.used}</td>
    <td><b style="color:var(--ok)">${r.free}</b></td>
    <td style="font-size:11px;color:var(--mut-d)">${dayTxt}</td></tr>`;}).join('');
  return `<div class="wk-head"><h2>Unused Ice</h2><div class="dt">Real contracted slots with no game scheduled \u2014 spare capacity you could fill or release. Counted per venue-weekend against real ice only.</div></div>
    <div class="grid cards4" style="margin-bottom:18px">

/* ============ WEEKEND ============ */
/* ===== FSL weekend auto-solve core (spec v1: hard rules + shape + packing) =====
   Assigns DAY + START TIME to already-placed matchups, per venue (single sheet).
   Hard rules: 8:00 floor, 10:45 cap, Sunday ends by 2:45, >=165 rest same-day,
   <=2 games/team/day; 3-team pods spread 2/2/2. Day/slot choices are heuristic
   (not yet travel-optimized). Returns valid schedules or flags what needs review. */
const _SLV=(function(){
  const BUF=(CFG.bufferMin||15), FLOOR=480, LATE=1365, SUNCAP=885, DEF=570, FRIEND=1305, R_SAME=165, R_DEF=180;
  const DAYS=['Fri','Sat','Sun'];
  const block=d=>Math.round((((CFG.slotHours||{})[d])||2)*60);
  const mkey=g=>g.division+'|'+[g.home,g.away].slice().sort().join('~');
  const mm=t=>{let h=Math.floor((t%1440)/60),m=t%60,ap=h<12?'AM':'PM',hh=h%12||12;return hh+':'+String(m).padStart(2,'0')+' '+ap;};

function assignDays(games){
  const cnt={}; games.forEach(g=>[g.home,g.away].forEach(t=>{const k=g.division+'|'+t;cnt[k]=(cnt[k]||0)+1;}));
  const tgt={};
  Object.keys(cnt).forEach(k=>{let c=cnt[k],n=k.startsWith('19U');
    let t = c>=4?{Fri:1,Sat:2,Sun:1}: c===3?(n?{Fri:1,Sat:1,Sun:1}:{Fri:1,Sat:2,Sun:0}): c===2?{Fri:0,Sat:1,Sun:1}: {Fri:0,Sat:1,Sun:0};
    if(c>4){t={Fri:1,Sat:2,Sun:1};let rem=c-4;while(rem>0){if(t.Fri<2)t.Fri++;else if(t.Sat<3)t.Sat++;else t.Sun++;rem--;}}
    tgt[k]=t;});
  const dayCnt={}, mday={}; let sunUsed=0;
  const assign={}, podDone=new Set();

  // --- 3-team pods: a division at this venue with exactly 3 teams plays a double round-robin;
  //     spread it evenly across days (6 games -> 2/2/2) so no team is jammed onto one day. ---
  const byDiv={}; games.forEach(g=>{(byDiv[g.division]=byDiv[g.division]||[]).push(g);});
  Object.keys(byDiv).forEach(div=>{
    const gs=byDiv[div], teams=[...new Set(gs.reduce((a,g)=>a.concat([g.home,g.away]),[]))];
    if(teams.length!==3) return;
    const n=gs.length, base=Math.floor(n/3), ex=n%3, long=block(div)===135;
    let want={Fri:base+(ex>0?1:0), Sat:base+(ex>1?1:0), Sun:base};
    if(long && want.Sun>1){ want.Sat+=want.Sun-1; want.Sun=1; }   // long blocks can't double on Sunday (2:45)
    else if(!long && want.Sun>2){ want.Sat+=want.Sun-2; want.Sun=2; }
    const pool=gs.slice(), ltd={}, lpd={}, pk=g=>[g.home,g.away].slice().sort().join('~');
    const load=(g,d)=>(ltd[g.home+'|'+d]||0)+(ltd[g.away+'|'+d]||0);
    for(const d of ['Sat','Fri','Sun']){ let need=want[d]; const capTeam=(d==='Sun'&&long)?1:2;
      while(need>0 && pool.length){
        pool.sort((a,b)=>load(a,d)-load(b,d));
        let pick=pool.find(g=>[g.home,g.away].every(t=>(ltd[t+'|'+d]||0)<capTeam) && (lpd[pk(g)+'|'+d]||0)<1)
              || pool.find(g=>[g.home,g.away].every(t=>(ltd[t+'|'+d]||0)<capTeam));
        if(!pick) break;
        assign[pick._i]=d; podDone.add(pick._i);
        [pick.home,pick.away].forEach(t=>{ltd[t+'|'+d]=(ltd[t+'|'+d]||0)+1; dayCnt[div+'|'+t+'|'+d]=(dayCnt[div+'|'+t+'|'+d]||0)+1;});
        lpd[pk(pick)+'|'+d]=(lpd[pk(pick)+'|'+d]||0)+1;
        mday[mkey(pick)+'|'+d]=(mday[mkey(pick)+'|'+d]||0)+1;
        if(d==='Sun') sunUsed+=block(div)+BUF;
        pool.splice(pool.indexOf(pick),1); need--;
      }
    }
    pool.forEach(g=>{ assign[g._i]='Sat'; podDone.add(g._i); // safety: any leftover to Saturday
      [g.home,g.away].forEach(t=>{dayCnt[div+'|'+t+'|Sat']=(dayCnt[div+'|'+t+'|Sat']||0)+1;});
      mday[mkey(g)+'|Sat']=(mday[mkey(g)+'|Sat']||0)+1;});
  });

  // --- greedy shape for everything else ---
  const deg=g=>cnt[g.division+'|'+g.home]+cnt[g.division+'|'+g.away];
  const order=games.filter(g=>!podDone.has(g._i)).sort((a,b)=>(block(a.division)-block(b.division))||(deg(b)-deg(a)));
  for(const g of order){
    let best='Sat',bc=Infinity;
    for(const d of DAYS){const c=cost(g,d);if(c<bc){bc=c;best=d;}}
    place(g,best);
  }
  function cost(g,d){
    let c=0;
    const hk=g.division+'|'+g.home+'|'+d, ak=g.division+'|'+g.away+'|'+d;
    if((dayCnt[hk]||0)>=2||(dayCnt[ak]||0)>=2) return 1e12;              // >2/day hard
    const mk=mkey(g)+'|'+d; if((mday[mk]||0)>=1) c+=600;                  // same-day repeat (bends first)
    if(d==='Sun'){ if((dayCnt[hk]||0)>=1||(dayCnt[ak]||0)>=1) return 1e12; const add=block(g.division)+BUF; if(sunUsed+add>(SUNCAP-FLOOR)+BUF) return 1e12; if(block(g.division)===135)c+=6;}
    [g.home,g.away].forEach(t=>{const cur=(dayCnt[g.division+'|'+t+'|'+d]||0),tg=(tgt[g.division+'|'+t]||{})[d]||0; if(cur>=tg)c+=25*(cur-tg+1);});
    c += {Fri:0,Sat:1,Sun:2}[d];
    return c;
  }
  function place(g,d){assign[g._i]=d;
    [g.home,g.away].forEach(t=>{const k=g.division+'|'+t+'|'+d;dayCnt[k]=(dayCnt[k]||0)+1;});
    const mk=mkey(g)+'|'+d; mday[mk]=(mday[mk]||0)+1;
    if(d==='Sun') sunUsed+=block(g.division)+BUF;}
  return assign;
}

function packOne(games,day){
  const cap=day==='Sun'?SUNCAP:LATE;
  function build(start,REST,set){
    let t=start,last={},out=[],rem=set.slice(),guard=0; const tl=k=>last[k]==null?-1e9:last[k];
    while(rem.length && guard++<2000){
      const ready=rem.filter(g=>[g.home,g.away].every(tm=>tl(g.division+'|'+tm)+REST<=t));
      if(ready.length){
        ready.sort((a,b)=>{const ra=Math.min(...[a.home,a.away].map(tm=>t-tl(a.division+'|'+tm)));const rb=Math.min(...[b.home,b.away].map(tm=>t-tl(b.division+'|'+tm)));return rb-ra;});
        const g=ready[0], en=t+block(g.division);
        out.push(Object.assign({},g,{start:t,end:en})); t=en+BUF; [g.home,g.away].forEach(tm=>last[g.division+'|'+tm]=en); rem=rem.filter(x=>x!==g);
      } else { t=Math.min(...rem.map(g=>Math.max(...[g.home,g.away].map(tm=>tl(g.division+'|'+tm)+REST)))); }
    }
    const se=out.length?Math.max(...out.map(o=>o.end)):start, ss=out.length?Math.min(...out.map(o=>o.start)):start;
    return {out,ss,se,len:se-start};
  }
  function attempt(REST,set){ let res;
    if(day==='Sun'){ res=build(DEF,REST,set); if(res.se>SUNCAP) res=build(Math.max(FLOOR,DEF-(res.se-SUNCAP)),REST,set); }
    else if(day==='Fri'){ const L=build(FLOOR,REST,set).len; res=build(Math.max(FLOOR,FRIEND-L),REST,set); }
    else { const L=build(FLOOR,REST,set).len; res=build(Math.max(FLOOR,Math.min(DEF,LATE-L)),REST,set); }
    res.over=Math.max(0,res.se-cap)+Math.max(0,FLOOR-res.ss); return res;
  }
  let set=games.slice(), dropped=[];
  while(true){
    let res=attempt(R_DEF,set); if(res.over>0){const r2=attempt(R_SAME,set); if(r2.over<res.over)res=r2;}
    if(res.over===0 || !set.length){
      return {out:res.out.sort((a,b)=>a.start-b.start), dropped, ss:res.ss, se:res.se, ok:(res.over===0)};
    }
    const last=res.out.reduce((a,b)=>b.end>a.end?b:a); // drop the latest-ending game, then retry
    dropped.push(last); set=set.filter(g=>g._i!==last._i);
  }
}



function solveVenue(rawGames){
  const games=rawGames.map((g,i)=>Object.assign({},g,{_i:i}));
  const assign=assignDays(games);
  const unplaced=new Set(), repairs=[], flags=[];
  const byDay=()=>{const b={Fri:[],Sat:[],Sun:[]};games.forEach(g=>{if(unplaced.has(g._i))return;b[assign[g._i]].push(g);});return b;};
  const idOf=i=>{const g=games.find(x=>x._i===i);return g?g.id:i;};
  for(let iter=0;iter<160;iter++){
    const b=byDay(), packed={}; let dropped=[];
    for(const d of DAYS){ packed[d]=packOne(b[d],d); dropped=dropped.concat(packed[d].dropped.map(x=>x._i)); }
    if(!dropped.length){
      return {out:{Fri:packed.Fri.out,Sat:packed.Sat.out,Sun:packed.Sun.out}, unplaced:[...unplaced].map(idOf), flags, repairs};
    }

// Assign a pod's games into fixed real slots. Honors the real per-day slot COUNT (so it

function placeIntoSlots(list, slots){

  const S=slots.filter(s=>DAYIDX[s.day]!=null).slice().sort((a,b)=>DAYIDX[a.day]-DAYIDX[b.day]||(a.start-b.start));
  const gm=list.map(g=>({id:String(g.id),division:g.division,home:g.home,away:g.away,_placed:false}));

  const mk=g=>g.division+'|'+[g.home,g.away].slice().sort().join('~');
  const fits=(g,slot)=>{
    const en=slot.end!=null?slot.end:slot.start+block(g.division);
    for(const t of [g.home,g.away]){
      const k=g.division+'|'+t+'|'+slot.day;
      if((dayCnt[k]||0) >= maxFor(g.division,slot.day)) return false;
      for(const it of (teamTimes[k]||[])){
        if(slot.start < it.end && en > it.start) return false;                 // time overlap
        const gap = slot.start>=it.end ? slot.start-it.end : it.start-en;       // same-day rest
        if(gap < REST) return false;

    if(slot.end!=null && (slot.end-slot.start) < block(g.division)){

    }

  if(openSlots>0) warns.push(openSlots+' uploaded slot'+(openSlots>1?'s':'')+' left unused (more real ice than games).');

  const venLockBtn = isLocked(wk) ? '' : `<button data-act="toggleVenueLock" data-wk="${iceEscA(wk)}" data-venue="${iceEscA(v.venue)}" title="${isVenueLocked(wk,v.venue)?'Unlock this venue':'Lock just this venue \u2014 hold its games, skip it in auto-solve, and disable edits/moves here'}" style="margin-left:8px;font-size:10.5px;padding:2px 9px;border-radius:6px;font-weight:700;cursor:pointer;border:1px solid ${isVenueLocked(wk,v.venue)?'var(--ok)':'var(--line-l)'};background:${isVenueLocked(wk,v.venue)?'#e8f6ee':'#fff'};color:${isVenueLocked(wk,v.venue)?'var(--ok)':'var(--mut-d)'};white-space:nowrap">${isVenueLocked(wk,v.venue)?'\uD83D\uDD12 Locked \u00b7 unlock':'\uD83D\uDD13 Lock venue'}</button>`;
  return `<div class="venue-block"${overBooked?' style="border:2px solid var(--red)"':(ghostIce?' style="border:1.5px dashed var(--warn);background:#FFFBF0"':(isVenueLocked(wk,v.venue)&&!isLocked(wk)?' style="border:1.5px solid var(--ok)"':''))}>
    <div class="venue-top"><div class="vn">${v.venue.replace(/\s*\(NEW\)/i,'')}${isNew?'<span class="new">NEW · SOURCE ICE</span>':''}
      <span class="pill ${regClass(v.region)}" style="margin-left:8px">${v.region}</span>${ghostIce?`<span class="pill" title="This ice is not secured/contracted yet — it does not exist. Games are shown here so they aren't lost, but you still need to source real ice." style="margin-left:6px;background:var(--warnbg);color:var(--warn);font-weight:800">\u26A0 ICE DOES NOT EXIST</span>`:''}${Math.max(sheetsForCap(v.capFri),sheetsForCap(v.capSat),sheetsForCap(v.capSun))>1?`<span class="pill" style="margin-left:6px;background:#EEEDFE;color:#3C3489">${Math.max(sheetsForCap(v.capFri),sheetsForCap(v.capSat),sheetsForCap(v.capSun))} sheets</span>`:''}${overBooked?`<span class="pill" title="More games than ice slots${overDays.length?' on '+overDays.join(', '):''}" style="margin-left:6px;background:var(--red);color:#fff;font-weight:800">\u26A0 OVERBOOKED ${totUsed}/${totCap}${overDays.length?' \u00b7 '+overDays.join('/'):''}</span>`:''}${isVenueLocked(wk,v.venue)?`<span class="pill" style="margin-left:6px;background:#e8f6ee;color:var(--ok);font-weight:800">\uD83D\uDD12 locked</span>`:''}${venLockBtn}</div>
      <div class="slots">${slot('Fri')}${slot('Sat')}${slot('Sun')}<div class="slot ${tcls}"><div class="d">tot</div><div class="v">${totUsed}/${totCap||'—'}</div></div></div></div>
    ${parkBar}${lockedNote}
    ${(SLOT_EDIT===(wk+'|||'+v.venue) && !vLocked)?slotGrid(wk,v.venue):''}
    ${swapBar}
    <div class="venue-games">${bodyGroups||'<div style="color:var(--mut-d);font-size:12px;padding:8px 0">No games placed here yet.</div>'}
    </div></div>`;
}
function gameLine(g){

/* ============ DIVISION ============ */
function divisionView(div){
  const tt=teamsByDiv(div);
  const rows=tt.map(nm=>{
    const t=teamObj(nm,div);
    const gc=teamGameCount(nm,div);const tgt=gameTarget(div);
    const wks=teamWeekends(nm,div).length;
    const pct=Math.min(100,Math.round(gc/tgt*100));
    return `<tr>
      <td class="tm"><a class="tlink" data-nav="team" data-team="${nm}" data-div="${div}">${tdisp(nm,div)}</a></td>
      <td><span class="pill ${regClass(t.region)}">${t.region}</span></td>
      <td>${t.inSchool?'<span class="pill school">in-school</span>':''}</td>
      <td><b>${gc}</b> / ${tgt}</td>
      <td>${wks} wknds</td>
      <td style="width:130px"><div class="prog"><i style="width:${pct}%"></i></div></td>
    </tr>`;
  }).join('');
  // matchup matrix
  const mtx=oppMatrix(div,tt);
  return `<div class="wk-head"><h2>${div}</h2><div class="dt">${tt.length} teams · ${perShow(div)} games per showcase · ${gameTarget(div)}-game season</div></div>
    <div class="sectionhead"><h2><span class="bar"></span>Teams &amp; progress</h2>
      <span style="font-size:11.5px;color:var(--mut-d);font-weight:600">Click a team to open its schedule →</span></div>
    <table class="tbl"><thead><tr><th>Team</th><th>Region</th><th>Flags</th><th>Games</th><th>Weekends</th><th>Progress</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="sectionhead"><h2><span class="bar"></span>Opponent matrix</h2></div>
    ${mtx}
    <div class="sectionhead"><h2><span class="bar"></span>Fixtures <span style="font-size:11.5px;color:var(--mut-d);font-weight:600">(${games.filter(g=>g.division===div).length} games · click a column to sort)</span></h2></div>
    ${fixturesTable(div)}`;
}
let fixSort={div:null,key:'wk',dir:1};
function fixturesTable(div){
  const wkRank=w=>WK.indexOf(w);
  const dayRank=d=>({Fri:0,Sat:1,Sun:2})[d]??9;
  let gs=games.filter(g=>g.division===div).map(g=>({...g}));
  const k=fixSort.div===div?fixSort.key:'wk';
  const dir=fixSort.div===div?fixSort.dir:1;
  const mno=matchupNumbers();
  const cmp={
    num:(a,b)=>(mno[String(a.id)]||0)-(mno[String(b.id)]||0),
    wk:(a,b)=>wkRank(a.weekend)-wkRank(b.weekend)||dayRank(a.day)-dayRank(b.day)||(a.time||'').localeCompare(b.time||''),
    venue:(a,b)=>a.venue.localeCompare(b.venue),
    home:(a,b)=>a.home.localeCompare(b.home),
    away:(a,b)=>a.away.localeCompare(b.away),
    day:(a,b)=>dayRank(a.day)-dayRank(b.day)||(a.time||'').localeCompare(b.time||''),
  }[k]||((a,b)=>0);
  gs.sort((a,b)=>cmp(a,b)*dir);
  const arrow=key=>fixSort.div===div&&fixSort.key===key?(fixSort.dir>0?' ▲':' ▼'):'';
  const th=(key,label)=>`<th data-act="fixsort" data-div="${div}" data-key="${key}" style="cursor:pointer;user-select:none">${label}${arrow(key)}</th>`;
  const rows=gs.map(g=>`<tr>
    <td style="font-variant-numeric:tabular-nums;font-weight:800;color:var(--mut-d)">${matchNo(g)}</td>
    <td><b>${g.weekend}</b></td><td>${g.day||''}</td><td>${g.time||'TBD'}</td>
    <td>${g.venue.replace(/\s*\(NEW\)/i,'')}</td>
    <td class="tm" style="color:var(--mut-d)">${g.sheet?iceEscA(g.sheet):''}</td>
    <td class="tm">${g.home}</td><td style="color:var(--mut-d)">vs</td><td class="tm">${g.away}</td></tr>`).join('');
  return `<table class="tbl"><thead><tr>${th('num','#')}${th('wk','Weekend')}${th('day','Day')}<th>Time</th>${th('venue','Venue')}<th>Sheet</th>${th('home','Home')}<th></th>${th('away','Away')}</tr></thead><tbody>${rows}</tbody></table>`;
}
function oppMatrix(div,tt){
  const cnt={};
  games.filter(g=>g.division===div).forEach(g=>{
    cnt[g.home+'|'+g.away]=(cnt[g.home+'|'+g.away]||0)+1;
    cnt[g.away+'|'+g.home]=(cnt[g.away+'|'+g.home]||0)+1;
  });
  const head=`<th></th>`+tt.map(t=>`<th style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;padding:6px 2px;max-height:90px">${t.replace(/- (AA|Gold|Green)/,'')}</th>`).join('')+`<th>Tot</th>`;
  const rows=tt.map(a=>{
    let tot=0;
    const cells=tt.map(b=>{if(a===b)return '<td style="background:var(--blk)"></td>';
      const n=cnt[a+'|'+b]||0;tot+=n;
      const bg=n===0?'':n>2?'background:var(--dangerbg);color:var(--red-d);font-weight:800':'background:var(--okbg)';
      return `<td style="text-align:center;${bg}">${n||''}</td>`;}).join('');
    return `<tr><td class="tm" style="font-size:11px">${a.replace(/- (AA|Gold|Green)/,'')}</td>${cells}<td style="text-align:center;font-weight:800">${tot}</td></tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table class="tbl" style="font-size:11px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="legend"><span><span class="sw" style="background:var(--okbg)"></span>1–2 meetings</span><span><span class="sw" style="background:var(--dangerbg)"></span>3+ (review)</span></div>`;
}

/* ============ TEAM ============ */
function teamView(nm,div){
  const t=teamObj(nm,div);
  const tgames=games.filter(g=>(g.home===nm||g.away===nm)&&g.division===div)
    .sort((a,b)=>WK.indexOf(a.weekend)-WK.indexOf(b.weekend));
  const parked=tgames.filter(isParkedGame);
  const placed=tgames.filter(g=>!isParkedGame(g));
  const gc=tgames.filter(isPlaced).length,tgt=gameTarget(div);
  // travel rows — placed games only, grouped by weekend (parked games are shown separately below)
  const itinRows=WK.map(wk=>{
    const gs=placed.filter(g=>g.weekend===wk);if(!gs.length)return'';
    const v=gs[0].venue;const cl=clusterName(v);
    const type=t.homeCluster===cl?'HOME':(t.region!==venueRegion(v)?'TRAVEL':'Local');
    const tc=type==='HOME'?'background:var(--okbg);color:#0f6e56':type==='TRAVEL'?'background:var(--warnbg);color:var(--warn)':'background:#eef;color:#3338a0';
    const opps=gs.map(g=>{const opp=g.home===nm?g.away:g.home;const meta=[g.day,g.time,g.sheet].filter(Boolean).join(' \u00b7 ');return opp+(meta?` <span style="color:var(--mut-d);font-size:11px">(${iceEscA(meta)})</span>`:'');});
    return `<tr><td><b>${wk}</b></td><td>${v.replace(/\s*\(NEW\)/i,'')}</td>

    const opp=g.home===nm?g.away:g.home;
    return `<tr><td><span class="pill" style="background:#FFF3D6;color:#7a5b00">\u25F7 TBD</span></td>
      <td style="color:var(--mut-d)">Parking garage \u2014 no venue</td>
      <td><span class="pill" style="background:#f4f4f6;color:var(--mut-d)">\u2014</span></td><td>1</td>
      <td style="font-size:12px">${iceEscA(opp)}</td></tr>`;
  }).join('');
  const placedWk=[...new Set(placed.map(g=>g.weekend))].length;
  const bcTrips=placed.filter(g=>venueRegion(g.venue)==='BC').map(g=>clusterName(g.venue));
  const cowichan=[...new Set(bcTrips.filter(c=>c==='Cowichan'))].length;
  return `<div class="wk-head"><h2>${nm} <span style="color:var(--red-l);font-size:16px">— ${div}</span></h2><div class="dt">home: ${t.homeCluster} · ${t.region}${t.inSchool?' · in-school (Thu/Fri/Mon flex)':''}</div></div>
    <div class="grid cards4" style="margin-bottom:18px">
      <div class="card"><h3><span class="ic">◆</span>Games</h3><div style="font-size:26px;font-weight:800">${gc}<span style="font-size:14px;color:var(--mut-d)"> / ${tgt}</span></div></div>
      <div class="card"><h3><span class="ic">◆</span>Weekends</h3><div style="font-size:26px;font-weight:800">${placedWk}${parked.length?`<span style="font-size:13px;color:#7a5b00"> · ${parked.length} TBD</span>`:''}</div></div>
      <div class="card"><h3><span class="ic">◆</span>BC trips</h3><div style="font-size:26px;font-weight:800">${[...new Set(bcTrips.filter(c=>c!=='Kimberley'))].length}</div></div>
      <div class="card"><h3><span class="ic">◆</span>Cowichan trips</h3><div style="font-size:26px;font-weight:800;${cowichan>1?'color:var(--red)':''}">${cowichan}</div></div>
    </div>
    <div class="sectionhead"><h2><span class="bar"></span>Travel itinerary</h2></div>
    ${(itinRows||tbdRows)?`<table class="tbl"><thead><tr><th>Weekend</th><th>Venue</th><th>Type</th><th>Gms</th><th>Opponents</th></tr></thead><tbody>${itinRows}${tbdRows}</tbody></table>`
      :`<div class="empty"><div class="ic">🗓</div><h3>No games scheduled yet</h3><div>Add games for ${nm} from any weekend view.</div></div>`}`;
}
function venueRegion(vn){const v=DATA.venues.find(x=>x.venue===vn);return v?v.region:'';}

/* ============ TRAVEL MATRIX ============ */

/* ============ CONFLICTS ============ */
function conflictsView(){
  const all=detectConflicts();
  const active=all.filter(c=>!c.ack), acked=all.filter(c=>c.ack);
  const hard=active.filter(c=>c.sev==='hard'),soft=active.filter(c=>c.sev==='soft');
  const banner=hard.length?`<div class="conf-banner bad"><span class="ic">\u26A0</span><div><b>${hard.length} hard conflict${hard.length>1?'s':''}</b> and ${soft.length} soft warning${soft.length!==1?'s':''} to review.${acked.length?` <span style="opacity:.85">(${acked.length} acknowledged, hidden from alerts.)</span>`:''}</div></div>`
    :`<div class="conf-banner good"><span class="ic">\u2713</span><div><b>No active hard conflicts.</b>${soft.length?` ${soft.length} soft warning${soft.length>1?'s':''} to review.`:' Everything checks out.'}${acked.length?` <span style="opacity:.85">(${acked.length} acknowledged.)</span>`:''}</div></div>`;
  const group=(title,arr)=>arr.length?`<div class="sectionhead"><h2><span class="bar"></span>${title}</h2></div><ul class="conf-list">${arr.map(confItem).join('')}</ul>`:'';
  const ackedBlock=acked.length?`<div class="sectionhead" style="margin-top:24px"><h2><span class="bar" style="background:var(--mut)"></span>Acknowledged <span style="color:var(--mut);font-weight:600;font-size:13px">\u00b7 ${acked.length} hidden from alert counts</span></h2></div>
    <div style="margin:0 0 10px"><button data-act="confAckClear" style="font-size:12px;padding:5px 12px;border:1px solid var(--line-l);border-radius:7px;background:#fff;color:var(--mut-d);font-weight:700;cursor:pointer">\u21A9 Un-acknowledge all</button></div>
    <ul class="conf-list">${acked.map(confItem).join('')}</ul>`:'';
  return `<div class="wk-head"><h2>\u26A0 Conflict Check</h2><div class="dt">Live validation of every hard rule and soft objective across all placed games. Acknowledge an item to clear it from the alert counts \u2014 it stays listed here so nothing is lost.</div></div>
    ${banner}${group('Hard rule violations',hard)}${group('Soft warnings',soft)}${ackedBlock}
    ${all.length===0?'<div class="empty"><div class="ic">\u2713</div><h3>All clear</h3><div>No games yet, or every placed game passes the rules.</div></div>':''}`;
}
function confItem(c){
  const ackBtn = c.ack

function openAddGame(wk,venue){
  const allVenues=venuesFor(wk);
  const v0=venue||(allVenues[0]&&allVenues[0].venue)||'';
  const modal=document.createElement('div');modal.className='modal-bg';modal.id='modalbg';
  modal.innerHTML=`<div class="modal">
    <div class="modal-h"><h3>Add game · ${wk}</h3><button class="x" data-close>✕</button></div>
    <div class="modal-b">
      <div class="fld"><label>Division</label><select id="m-div">${DIVS.map(d=>`<option>${d}</option>`).join('')}</select></div>
      <div class="fld-row">
        <div class="fld"><label>Home</label><select id="m-home"></select></div>
        <div class="fld"><label>Away</label><select id="m-away"></select></div>
      </div>
      <div class="fld"><label>Venue</label><select id="m-venue">${allVenues.map(v=>`<option value="${v.venue}" ${v.venue===v0?'selected':''}>${v.venue.replace(/\s*\(NEW\)/i,'')}${/NEW/i.test(v.venue)?' (NEW)':''} · ${v.capFri}-${v.capSat}-${v.capSun}</option>`).join('')}<option value="__PARK__">🅿 Parking garage (hold — no slot)</option></select></div>
      <div class="fld-row">
        <div class="fld"><label>Day</label><select id="m-day"><option>Fri</option><option selected>Sat</option><option>Sun</option></select></div>
        <div class="fld"><label>Start time</label><input id="m-time" type="time" value="13:00" min="08:00" max="22:45"></div>
      </div>
      <div class="live-warn" id="m-warn"></div>
    </div>
    <div class="modal-foot"><button class="btn" data-close>Cancel</button><button class="btn primary" id="m-save">Add game</button></div>
  </div>`;
  document.getElementById('app').appendChild(modal);
  const divSel=modal.querySelector('#m-div'),homeSel=modal.querySelector('#m-home'),awaySel=modal.querySelector('#m-away');
  function fillTeams(){const tt=teamsByDiv(divSel.value);
    homeSel.innerHTML=tt.map(t=>`<option>${t}</option>`).join('');
    awaySel.innerHTML=tt.map((t,i)=>`<option ${i===1?'selected':''}>${t}</option>`).join('');
    checkWarn();}
  divSel.onchange=fillTeams;fillTeams();
  function gather(){return{weekend:wk,division:divSel.value,home:homeSel.value,away:awaySel.value,
    venue:modal.querySelector('#m-venue').value,day:modal.querySelector('#m-day').value,time:modal.querySelector('#m-time').value};}
  function checkWarn(){const g=gather();const w=modal.querySelector('#m-warn');
    if(g.home===g.away){w.className='live-warn show';w.innerHTML='<b>Home and away are the same team.</b>';return;}
    const warns=previewWarnings(g);
    if(warns.length){w.className='live-warn show';w.innerHTML='<b>This will create '+warns.length+' conflict'+(warns.length>1?'s':'')+':</b><br>'+warns.map(x=>'• '+x.msg).join('<br>');}
    else{w.className='live-warn';w.innerHTML='';}
  }
  ['#m-home','#m-away','#m-venue','#m-day','#m-time'].forEach(s=>modal.querySelector(s).oninput=checkWarn);
  modal.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>modal.remove());
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  modal.querySelector('#m-save').onclick=()=>{const g=gather();
    if(g.home===g.away){return;}
    if(g.venue!=='__PARK__' && g.venue && String(g.venue).trim() && typeof iceDoesNotExist==='function' && iceDoesNotExist(g.weekend,g.venue) && !confirm('This ice does not exist. Do you want to proceed?'))return;
    pushUndo('add game');
    const ng={id:'g'+(gid++),...g};if(ng.venue==='__PARK__'){ng.venue='';ng.day='';ng.time='';}games.push(ng);if(!ng.venue||!String(ng.venue).trim())PG.addParked(ng);modal.remove();render();};
}


/* ============ GAME-TIMES IMPORT (matching LOGIC only; no CSV data embedded) ============ */
var GAME_TIMES=(function(){try{return JSON.parse(localStorage.getItem('fsl_game_times_v1')||'{}')||{};}catch(e){return {};}})();
function saveGameTimes(){try{localStorage.setItem('fsl_game_times_v1',JSON.stringify(GAME_TIMES));}catch(e){}}
const IMP=(function(){
  // ---- FSL game-times import engine (pure; used by browser + node test) ----
  function parseCSV(text){
    text=text.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n');
    // delimiter auto-detect from header line
    const head=text.slice(0,text.indexOf('\n'));
    const delim=(head.split('\t').length>head.split(',').length)?'\t':',';
    const rows=[];let i=0,field='',row=[],q=false;
    const push=()=>{row.push(field);field='';};
    const eol=()=>{push();rows.push(row);row=[];};
    while(i<text.length){const c=text[i];
      if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false;} else field+=c; }
      else{ if(c==='"')q=true; else if(c===delim)push(); else if(c==='\n')eol(); else field+=c; }
      i++;}
    if(field.length||row.length)eol();
    const hdr=rows.shift().map(h=>h.trim());
    return rows.filter(r=>r.some(x=>x&&x.trim())).map(r=>{const o={};hdr.forEach((h,j)=>o[h]=(r[j]||'').trim());return o;});
  }
  // ---- date orientation auto-detect over all rows ----
  function detectDayFirst(rows,dateKey){
    let a=0,b=0;
    rows.forEach(r=>{const m=(r[dateKey]||'').match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
      if(m){a=Math.max(a,+m[1]);b=Math.max(b,+m[2]);}});
    if(a>12) return true;      // first component >12 => day-first
    if(b>12) return false;     // second component >12 => month-first
    return null;               // ambiguous
  }
  function parseDate(s,dayFirstDefault){
    s=(s||'').trim();
    let m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
    if(m){let d1=+m[1],d2=+m[2],y=+m[3];if(y<100)y+=2000;
      let day,mon;
      if(d1>12){day=d1;mon=d2;} else if(d2>12){mon=d1;day=d2;}
      else if(dayFirstDefault){day=d1;mon=d2;} else {mon=d1;day=d2;}
      return new Date(y,mon-1,day);}
    const d=new Date(s); return isNaN(d)?null:d;
  }
  // ---- weekend ranges parsed from config.weekendDates ----
  const MON={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  function weekendRanges(cfg){
    return cfg.weekendOrder.map(wk=>{
      const s=cfg.weekendDates[wk]||'';
      // e.g. "Oct 2–4, 2026" or "Oct 30–Nov 1, 2026" or "Jan 2–3, 2027"
      const ym=s.match(/(20\d\d)\s*$/);const year=ym?+ym[1]:2026;
      const core=s.replace(/,?\s*20\d\d\s*$/,'');
      const [L,R]=core.split(/[–-]/).map(x=>x.trim());
      const lm=L.match(/([A-Za-z]{3})\s+(\d{1,2})/);
      const startMon=MON[lm[1]],startDay=+lm[2];
      let endMon=startMon,endDay;
      const rm=R.match(/([A-Za-z]{3})\s+(\d{1,2})/);
      if(rm){endMon=MON[rm[1]];endDay=+rm[2];} else {endDay=+R;}
      // handle year rollover within a range (none expected here)
      const start=new Date(year,startMon,startDay), end=new Date(year,endMon,endDay,23,59);
      return {wk,start,end};
    });
  }
  function dateToWeekend(date,ranges){ if(!date)return null;
    for(const r of ranges){ if(date>=r.start&&date<=r.end)return r.wk; } return null; }
  // ---- normalization ----
  function normCity(s){return (s||'').toLowerCase().replace(/[^a-z]/g,'');}
  const ARENA_STOP=new Set(['arena','arenas','center','centre','sportsplex','sports','the','of','town','rink','rinks','at','ice','co','contract','jphl','user','new','plex','rec','recreation','complex','multiplex','gardens','silent']);
  const ARENA_ALIAS={'7':'seven','gprc':'greatplains','sise':'silentice','sls':'sls'};
  function arenaTokens(s){
    let t=(s||'').toLowerCase();
    t=t.replace(/\bcentre\b/g,'center').replace(/[\(\)\-\+\.,]/g,' ');
    let toks=t.split(/\s+/).filter(Boolean).map(w=>ARENA_ALIAS[w]||w);
    // expand glued aliases
    toks=toks.flatMap(w=> w==='silentice'?['silent','ice']:(w==='greatplains'?['great','plains']:[w]));
    return new Set(toks.filter(w=>!ARENA_STOP.has(w)));
  }
  function overlap(a,b){let n=0;a.forEach(x=>{if(b.has(x))n++;});return n;}
  // ---- venue resolver ----
  function buildVenueIndex(venues){
    return venues.map(v=>{const parts=v.venue.split(' — ');return {
      weekend:v.weekend, label:v.venue, status:v.status||'',
      city:normCity(parts[0]||v.venue), atoks:arenaTokens(parts[1]||v.venue)};});
  }
  function resolveVenue(row,wk,vidx){
    if(!wk)return {status:'nodate'};
    const cCity=normCity(row.City), cArena=arenaTokens(row.Arena);
    let cand=vidx.filter(v=>v.weekend===wk && v.city===cCity);
    let crossCity=false;
    if(!cand.length){cand=vidx.filter(v=>v.weekend===wk);crossCity=true;}
    if(!cand.length) return {status:'nocity', city:row.City, arena:row.Arena};
    // A venue record is "real ice" if its status says so, or it appears in the real-ice inventory
    // for this weekend. Uploaded contracted ice should always map to a real record, never to a
    // sourced / "To Source" / "user ice" placeholder when a real one exists for the same city+weekend.
    const realMap=(DATA.realIce&&DATA.realIce[wk])?DATA.realIce[wk]:{};
    const isReal=v=>/real ice/i.test(v.status||'')||Object.prototype.hasOwnProperty.call(realMap,v.label);
    const jac=v=>{const u=new Set([...cArena,...v.atoks]);return u.size?overlap(cArena,v.atoks)/u.size:0;};
    const scored=cand.map(v=>({v,sc:overlap(cArena,v.atoks),jc:jac(v),real:isReal(v)}));
    const maxSc=scored.reduce((m,s)=>Math.max(m,s.sc),0);
    // Pool = candidates sharing the top arena-token score. When the arena name gives no signal
    // (all scores 0, e.g. "Silent Ice Center" whose words are all stripped), consider every candidate.
    let pool = maxSc>0 ? scored.filter(s=>s.sc===maxSc) : scored.slice();
    // Prefer real ice; only fall back to non-real records if no real candidate is available.
    const realPool = pool.filter(s=>s.real);
    const chooseFrom = realPool.length ? realPool : pool;
    chooseFrom.sort((a,b)=> b.jc-a.jc || (b.real-a.real) || a.v.label.localeCompare(b.v.label));
    const best=chooseFrom[0];
    if(!best) return {status: crossCity?'nocity':'noarena', city:row.City, arena:row.Arena};
    const tie = chooseFrom.filter(s=>Math.abs(s.jc-best.jc)<1e-9).some(s=>s.v.label!==best.v.label);
    return {status:'ok',label:best.v.label,score:best.sc,real:best.real,tie,crossCity};
  }

  // ---- time/day + team helpers ----
  function parseTimeMin(s){s=(s||'').trim().toLowerCase();const m=s.match(/^(\d{1,2}):?(\d{2})?\s*(am|pm)?/);
    if(!m)return null;let h=+m[1],mn=+(m[2]||0);const ap=m[3];
    if(ap==='pm'&&h<12)h+=12; if(ap==='am'&&h===12)h=0; return h*60+mn;}
  function fmtTime(s){const t=parseTimeMin(s);if(t==null)return (s||'').trim();
    let h=Math.floor(t/60),mn=t%60,ap=h>=12?'PM':'AM',hh=h%12||12;return hh+':'+String(mn).padStart(2,'0')+' '+ap;}
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function dayFromDate(d){return d?DOW[d.getDay()]:'';}
  const TEAM_STOP=new Set(['aa','aaa','pro','hockey','club','academy','hc','the','fc']);
  function normTeam(s){return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w&&!TEAM_STOP.has(w)).sort().join(' ');}
  function teamEq(a,b){const A=normTeam(a),B=normTeam(b);if(!A||!B)return false;
    if(A===B)return true;const sa=new Set(A.split(' ')),sb=new Set(B.split(' '));let n=0;sa.forEach(x=>{if(sb.has(x))n++;});
    return n>0 && n>=Math.min(sa.size,sb.size);}

  // ---- pair slots to games within a matched venue-weekend ----
  function pairGroup(slots,games,parseDateFn){
    const hasTeams=slots.some(s=>s.Home&&s.Away);
    const S=slots.map((s,i)=>({i,s,day:dayFromDate(parseDateFn(s.Date)),min:parseTimeMin(s['Start Time'])}));
    const pairs=[],usedG=new Set(),usedS=new Set();
    if(hasTeams){
      S.forEach(row=>{const s=row.s;
        let gi=games.findIndex((g,j)=>!usedG.has(j)&&teamEq(g.home,s.Home)&&teamEq(g.away,s.Away)&&(!s.Division||normTeam(g.division)===normTeam(s.Division)));
        let swapped=false;
        if(gi<0){gi=games.findIndex((g,j)=>!usedG.has(j)&&teamEq(g.home,s.Away)&&teamEq(g.away,s.Home));swapped=gi>=0;}
        if(gi>=0){usedG.add(gi);usedS.add(row.i);pairs.push({slot:row,game:games[gi],conf:swapped?'swapped':'auto'});}
      });
    } else {
      const so=[...S].sort((a,b)=>({Fri:0,Sat:1,Sun:2,Mon:-1}[a.day]??9)-({Fri:0,Sat:1,Sun:2,Mon:-1}[b.day]??9)||(a.min??0)-(b.min??0));
      const go=[...games.keys()].sort((x,y)=>{const A=games[x],B=games[y];return (A.division+A.home+A.away).localeCompare(B.division+B.home+B.away);});
      for(let k=0;k<Math.min(so.length,go.length);k++){usedS.add(so[k].i);usedG.add(go[k]);pairs.push({slot:so[k],game:games[go[k]],conf:'order'});}
    }
    const extraSlots=S.filter(r=>!usedS.has(r.i)), extraGames=games.filter((g,j)=>!usedG.has(j));
    return {hasTeams,pairs,extraSlots,extraGames};
  }

  let CSV=null, SEL={}, _r=null, _v=null;
  const ranges=()=>_r||(_r=weekendRanges(DATA.config));
  const vidx=()=>_v||(_v=buildVenueIndex(DATA.venues));
  const gfor=(wk,label)=>games.filter(g=>g.weekend===wk&&g.venue===label);
  // City key from a venue label ("Edmonton — Silent Ice Center" -> "edmonton").
  const venueCity=label=>normCity(String(label==null?'':label).split(' — ')[0]||label);
  // A placed game's current venue counts as "real" if it's in the real-ice inventory for the
  // weekend, or its venue record's status says "real ice". Anything else (To Source / user ice /
  // sourced) is a placeholder that real uploaded ice is allowed to absorb.
  function venueIsReal(wk,label){
    if(!label)return false;
    const realMap=(DATA.realIce&&DATA.realIce[wk])?DATA.realIce[wk]:{};
    if(Object.prototype.hasOwnProperty.call(realMap,label))return true;
    const v=DATA.venues.find(x=>x.weekend===wk&&x.venue===label);
    return v?/real ice/i.test(v.status||''):false;
  }
  // Candidate games a group's slots may attach to: games already at this exact venue, PLUS —
  // when the uploaded venue is real ice — games sitting on a placeholder venue in the same
  // city that weekend. This lets contracted ice pull in games parked on "To Source" / "user ice"
  // records, but never steals games that are at a *different real* venue in the same city.
  function candGames(wk,label){
    const city=venueCity(label), targetReal=venueIsReal(wk,label);
    return games.filter(g=>{
      if(g.weekend!==wk)return false;
      if(g.venue===label)return true;
      if(!targetReal)return false;
      if(!g.venue||venueCity(g.venue)!==city)return false;
      return !venueIsReal(wk,g.venue);
    });
  }
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function analyze(){
    if(!CSV)return null;
    const df=CSV.dayFirst!==false, rg=ranges(), vi=vidx();
    const groups={},badDate=[],noVenue=[];
    CSV.rows.forEach(r=>{const d=parseDate(r.Date,df),wk=dateToWeekend(d,rg);
      if(!wk){badDate.push(r);return;}
      const res=resolveVenue(r,wk,vi);
      if(res.status!=='ok'){noVenue.push({r,wk});return;}
      const k=wk+'||'+res.label;(groups[k]=groups[k]||{wk,label:res.label,slots:[]}).slots.push(r);});
    return {groups,badDate,noVenue,df};
  }
  function pairing(g){
    const df=CSV.dayFirst!==false, gs=candGames(g.wk,g.label);
    const pr=pairGroup(g.slots,gs,s=>parseDate(s.Date,df));
    const def={};pr.pairs.forEach(p=>def[p.slot.i]=String(p.game.id));
    return {def,gs,extraGames:pr.extraGames,hasTeams:pr.hasTeams};
  }
  function gLabel(g){return esc(g.division)+': '+esc(g.home)+' vs '+esc(g.away);}
  function loadRows(rows,fileName){
    if(!rows||!rows.length){showToast('No rows found in that file.','warn');return;}
    const df=detectDayFirst(rows,'Date');
    CSV={fileName:fileName||'pasted',rows:rows,dayFirst:df===null?true:df};SEL={};render();
    showToast('Loaded '+rows.length+' rows from '+CSV.fileName+' \u2014 review + apply per weekend.','good');
  }
  function loadText(){const ta=document.getElementById('imp_paste');loadRows(parseCSV(ta?ta.value:''),'pasted');}
  function loadFile(el){const f=el.files&&el.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>loadRows(parseCSV(String(rd.result)),f.name);rd.readAsText(f);}
  function pick(el){const k=el.dataset.key,i=el.dataset.slot;(SEL[k]=SEL[k]||{})[i]=el.value;}
  function applyGroup(d){
    const A=analyze();if(!A)return;const g=A.groups[d.key];if(!g)return;
    const P=pairing(g),df=CSV.dayFirst!==false;let n=0;
    g.slots.forEach((r,i)=>{const gid=(SEL[d.key]&&SEL[d.key][i]!=null)?SEL[d.key][i]:P.def[i];
      if(!gid)return;const dt=parseDate(r.Date,df);
      GAME_TIMES[gid]={date:r.Date,day:dayFromDate(dt),time:fmtTime(r['Start Time']),end:fmtTime(r['End Time']),sheet:(r['Ice Surface']||'').trim(),venue:g.label};
      const gg=games.find(x=>String(x.id)===String(gid));
      if(gg){gg.day=GAME_TIMES[gid].day;gg.time=GAME_TIMES[gid].time;gg.sheet=GAME_TIMES[gid].sheet;gg.endTime=GAME_TIMES[gid].end;gg.date=r.Date;gg.venue=g.label;}
      n++;});
    saveGameTimes();render();showToast('Applied '+n+' game times \u2014 '+g.wk+' \u00b7 '+g.label,'good');
  }
  function clear(){CSV=null;SEL={};render();showToast('Import cleared.','');}
  function resetTimes(){if(!confirm('Remove ALL imported game times from every game? Your schedule and matchups are unchanged.'))return;
    Object.keys(GAME_TIMES).forEach(id=>{const gg=games.find(x=>String(x.id)===String(id));if(gg){gg.day='';gg.time='';gg.sheet='';gg.endTime='';gg.date='';}});
    GAME_TIMES={};saveGameTimes();render();showToast('All imported times reset.','warn');}
  function overlay(){Object.keys(GAME_TIMES).forEach(id=>{const gg=games.find(x=>String(x.id)===String(id));if(gg){const t=GAME_TIMES[id];if(t.weekend)gg.weekend=t.weekend;if(t.day)gg.day=t.day;if(t.time)gg.time=t.time;if(t.end)gg.endTime=t.end;gg.sheet=t.sheet;gg.date=t.date;if(t.venue)gg.venue=t.venue;}});}
  function view(){
    const btn='padding:4px 12px;border-radius:7px;border:1px solid var(--line-l);background:#fff;font-size:12px;font-weight:700;cursor:pointer;';
    const prim=btn+'background:var(--ok);color:#fff;border-color:transparent;';
    const nApplied=Object.keys(GAME_TIMES).length;
    if(!CSV){
      return `<div class="wk-head"><h2>\uD83D\uDCE5 Import &amp; apply game times</h2>
        <div class="dt">Load your ice CSV (Date, City, Arena, Ice Surface, Start/End Time). Times attach to games you already placed \u2014 nothing changes until you Apply each weekend + venue. The file is read in your browser and never saved; a reload clears it.</div></div>
        ${nApplied?`<div class="card" style="padding:11px 14px;margin-bottom:12px;border-color:var(--warn)"><b>${nApplied}</b> games currently have imported times. <button data-act="impReset" style="${btn}border-color:var(--warn);color:var(--warn);margin-left:8px">Reset applied times</button></div>`:''}
        <div class="card" style="padding:16px">
          <div style="margin-bottom:8px"><b>Load a CSV file</b>&nbsp; <input type="file" data-actfile="impLoadFile" accept=".csv,.tsv,.txt"></div>
          <div style="margin:12px 0 6px;color:var(--mut-d)">\u2014 or paste rows copied from Excel / Google Sheets \u2014</div>
          <textarea id="imp_paste" rows="4" style="width:100%;box-sizing:border-box;font-family:ui-monospace,monospace;font-size:12px;border:1px solid var(--line-l);border-radius:8px;padding:8px" placeholder="Date&#9;City&#9;Arena&#9;Ice Surface&#9;Start Time&#9;End Time"></textarea>
          <div><button data-act="impPasteLoad" style="${prim}margin-top:8px">Load pasted rows</button></div>
        </div>`;
    }
    const A=analyze();
    const gk=Object.keys(A.groups).sort((a,b)=>{const wa=a.split('||')[0],wb=b.split('||')[0];return WK.indexOf(wa)-WK.indexOf(wb)||a.localeCompare(b);});
