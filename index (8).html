  impClear:()=>IMP.clear(),
  impReset:()=>IMP.resetTimes(),
  iceHave:d=>{const k=iceKey(d.wk,d.venue);if(ICE_DECISIONS[k]==='have')delete ICE_DECISIONS[k];else ICE_DECISIONS[k]='have';saveIceDecisions();render();showToast('\u2713 Marked as SECURED (real ice): '+d.venue+' \u00b7 '+d.wk,'good');},
  iceNo:d=>{const k=iceKey(d.wk,d.venue);if(ICE_DECISIONS[k]==='no')delete ICE_DECISIONS[k];else ICE_DECISIONS[k]='no';saveIceDecisions();render();showToast('\u2717 Flagged as NOT secured \u2014 needs sourcing: '+d.venue+' \u00b7 '+d.wk,'warn');},
  iceHeld:d=>{const k=iceKey(d.wk,d.venue);if(ICE_DECISIONS[k]==='held')delete ICE_DECISIONS[k];else ICE_DECISIONS[k]='held';saveIceDecisions();render();showToast('\u23F8 Held as UNSOURCED (kept, awaiting confirmation): '+d.venue+' \u00b7 '+d.wk,'');},
  iceDel:d=>{ICE_DECISIONS[iceKey(d.wk,d.venue)]='del';saveIceDecisions();render();showToast('Removed from ice list: '+d.venue+' \u00b7 '+d.wk+'. Restore from the hidden list below.','warn');},
  iceRestore:d=>{delete ICE_DECISIONS[iceKey(d.wk,d.venue)];saveIceDecisions();render();showToast('Restored: '+d.venue+' \u00b7 '+d.wk,'good');},
  iceReset:()=>{if(!Object.keys(ICE_DECISIONS).length){showToast('No ice decisions to reset.','');return;}if(!confirm('Clear all your ice have / need / unsourced / hidden decisions?'))return;ICE_DECISIONS={};saveIceDecisions();render();showToast('All ice decisions cleared.','good');},
  venueAdd:()=>{const val=id=>{const e=document.getElementById(id);return e?String(e.value).trim():'';};
    const wk=val('va-wk'), name=val('va-name'), region=val('va-region');
    const cf=Math.max(0,parseInt(val('va-fri'),10)||0), cs=Math.max(0,parseInt(val('va-sat'),10)||0), cu=Math.max(0,parseInt(val('va-sun'),10)||0);
    if(!wk){showToast('Pick a weekend.','warn');return;}
    if(!name){showToast('Enter a venue name.','warn');return;}
    if(!WK.includes(wk)){showToast('Unknown weekend.','warn');return;}
    if(cf+cs+cu===0){showToast('Enter at least one slot (Fri, Sat, or Sun).','warn');return;}
    if(DATA.venues.some(v=>v.weekend===wk&&v.venue===name)){showToast('That venue already exists for '+wk+'.','warn');return;}
    const rec={weekend:wk,venue:name,region:region||'',status:'Real ice (added)',capFri:cf,capSat:cs,capSun:cu,added:true};
    DATA.venues.push(rec); VENUE_ADDS.push({weekend:wk,venue:name,region:region||'',status:'Real ice (added)',capFri:cf,capSat:cs,capSun:cu}); saveVenueAdds();
    try{IMP.resetVenues&&IMP.resetVenues();}catch(e){}
    render();showToast('\u2713 Added ice: '+name+' \u00b7 '+wk+' ('+cf+'-'+cs+'-'+cu+'). Move games onto it from the schedule or parking garage.','good');},
  venueAddDel:d=>{const wk=d.wk, ven=d.venue;
    const onIt=games.filter(g=>g.weekend===wk&&g.venue===ven).length;
    if(onIt>0){showToast('Move the '+onIt+' game'+(onIt>1?'s':'')+' off '+ven+' first (park or relocate them), then delete.','warn');return;}
    VENUE_ADDS=VENUE_ADDS.filter(v=>!(v.weekend===wk&&v.venue===ven)); saveVenueAdds();
    const i=DATA.venues.findIndex(v=>v.weekend===wk&&v.venue===ven&&v.added); if(i>=0)DATA.venues.splice(i,1);
    try{IMP.resetVenues&&IMP.resetVenues();}catch(e){}
    render();showToast('Deleted added ice: '+ven+' \u00b7 '+wk,'good');},
  togglesb:()=>document.getElementById('sb').classList.toggle('open'),
  fixsort:d=>{if(fixSort.div===d.div&&fixSort.key===d.key){fixSort.dir*=-1;}else{fixSort={div:d.div,key:d.key,dir:1};}render();},
  exportj:()=>{ // download the current schedule as JSON
    const payload={stamp:(DATA.published&&DATA.published.stamp)||'',exported:new Date().toISOString(),games};
    const blob=new Blob([JSON.stringify(payload,null,1)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='FSL_schedule_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
    showToast('Schedule saved — '+games.length+' games exported as JSON.','good');
  },
  importj:()=>{ // load a schedule JSON (either a raw array or {games:[...]})
    const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
    inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;
      const r=new FileReader();
      r.onerror=()=>showToast('Could not read the file (browser read error). Try re-saving it and loading again.','bad');
      r.onload=()=>{
        let arr;
        try{
          let txt=String(r.result||'').replace(/^\uFEFF/,'').trim();   // strip BOM/whitespace
          if(!txt) throw new Error('the file is empty');
          const o=JSON.parse(txt);
          arr=Array.isArray(o)?o:(Array.isArray(o.games)?o.games:null);
          if(!arr) throw new Error('this JSON has no games list (expected an array, or an object with a "games" array)');
          for(let i=0;i<arr.length;i++){ const g=arr[i];
            const miss=!g?['(not an object)']:['weekend','division','home','away'].filter(k=>!g[k]);
            if(!g||miss.length) throw new Error('game #'+(i+1)+(g&&g.id?' (id '+g.id+')':'')+' is missing: '+(g?miss.join(', '):'(empty)'));
          }
        }catch(e){ showToast('Could not load file: '+e.message,'bad'); return; }
        // File is valid — apply it. A later redraw error must NOT be reported as a load failure.
        games=arr.map(g=>({day:'',time:'',...g}));
        try{applyRemovedGames();}catch(e){}  // item 5: keep permanently-removed games out after a reload
        let mx=0;games.forEach(g=>{const x=parseInt(String(g.id||'').replace(/\D/g,''),10);if(x>mx)mx=x;});gid=mx+1;
        // Persist the loaded schedule (weekend + venue + day/time/sheet) so placements survive
        // future reloads and new app versions — not just this session.
        try{ Object.keys(GAME_TIMES).forEach(k=>delete GAME_TIMES[k]);
          games.forEach(g=>{ const placed=g.venue&&String(g.venue).trim(); if(placed||g.day||g.time||g.sheet){ GAME_TIMES[String(g.id)]={date:g.date||'',weekend:g.weekend||'',day:g.day||'',time:g.time||'',end:g.endTime||'',sheet:g.sheet||'',venue:g.venue||''}; } });
          saveGameTimes(); }catch(e){}
        try{ Object.keys(PARKING).forEach(k=>delete PARKING[k]);
          games.forEach(g=>{ if(WK.includes(g.weekend) && (!g.venue||!String(g.venue).trim())){ PARKING[String(g.id)]={from:'',day:g.day||'',time:g.time||'',sheet:g.sheet||'',end:g.endTime||'',wk:g.weekend,division:g.division,home:g.home,away:g.away}; } });
          saveParking(); }catch(e){}
        try{ render(); }catch(e){ showToast('Loaded '+games.length+' games, but the view failed to redraw ('+e.message+'). Try switching tabs.','warn'); return; }
        showToast('Loaded '+games.length+' games from '+f.name+'.','good');
      };
      r.readAsText(f);};
    inp.click();
  },
  quickadd:()=>{ // add a game to the weekend being viewed (or the first weekend with ice)
    const wk=(view.type==='weekend'&&view.wk)||WK.find(w=>venuesFor(w).length)||WK[0];
    openAddGame(wk);
  },
  autosolve:d=>{ // assign days + start times across this weekend's venues per the spec
    if(isLocked(d.wk)){showToast('\uD83D\uDD12 '+d.wk+' is locked \u2014 unlock it to auto-solve.','warn');return;}
    const r=solveWeekend(d.wk);
    if(r.report) SOLVE_REPORT[d.wk]=r.report;
    showToast(r.msg, r.ok?'good':'warn');
    render();
  },
  solveDismiss:d=>{ delete SOLVE_REPORT[d.wk]; render(); }
};

if(DATA.published&&Array.isArray(DATA.published.games)&&DATA.published.games.length){
  games=DATA.published.games.map(g=>({...g}));
  var mx=0;games.forEach(g=>{var n=parseInt(String(g.id).replace(/\D/g,''),10);if(n>mx)mx=n;});
  gid=mx+1;
}
try{applyRemovedGames();}catch(e){}  // item 5: drop games the user permanently removed (persists across versions)
try{IMP.overlay();}catch(e){}
try{PG.overlay();}catch(e){}
render();
(function(){var s=document.getElementById('pubstamp');if(s&&DATA.published&&DATA.published.stamp)s.textContent='Published '+DATA.published.stamp;})();

</script>
</body>
</html>
